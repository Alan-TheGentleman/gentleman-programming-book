<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="El loop agéntico: pseudocódigo del ciclo while con llamadas al modelo y un contexto que crece en cada iteración">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s20-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="s20-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M1 1L5 3L1 5" stroke="#7FB4CA" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="s20-arrow-m" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M1 1L5 3L1 5" stroke="#A1AABB" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="260" y="26" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">ARQUITECTURA DEL AGENTE</text>
  <text x="260" y="46" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">El loop agéntico</text>

  <!-- flecha de loop -->
  <path d="M210 236 C120 236 52 200 52 147 C52 94 120 58 210 58" stroke="#7FB4CA" stroke-width="1.6" opacity="0.9" marker-end="url(#s20-arrow)"/>
  <text transform="rotate(-90 40 150)" x="40" y="150" text-anchor="middle" font-size="9" letter-spacing="2" fill="#7FB4CA" filter="url(#s20-glow)">LOOP</text>

  <!-- code card -->
  <rect x="85" y="72" width="250" height="150" rx="10" fill="#1c212c" stroke="#313342"/>
  <circle cx="100" cy="86" r="3" fill="#313342"/>
  <circle cx="112" cy="86" r="3" fill="#313342"/>
  <circle cx="124" cy="86" r="3" fill="#313342"/>
  <text x="100" y="110" font-family="monospace" font-size="11" fill="#F3F6F9"><tspan fill="#7FB4CA">while</tspan> (true) {</text>
  <text x="113" y="129" font-family="monospace" font-size="11" fill="#F3F6F9">r = llm(contexto)</text>
  <text x="113" y="148" font-family="monospace" font-size="11" fill="#F3F6F9"><tspan fill="#7FB4CA">if</tspan> (r.tool_call) {</text>
  <text x="126" y="167" font-family="monospace" font-size="11" fill="#F3F6F9">contexto += ejecutar(r)</text>
  <text x="113" y="186" font-family="monospace" font-size="11" fill="#F3F6F9">} <tspan fill="#7FB4CA">else return</tspan> r</text>
  <text x="100" y="205" font-family="monospace" font-size="11" fill="#F3F6F9">}</text>

  <!-- conector hacia el contexto -->
  <line x1="340" y1="152" x2="362" y2="152" stroke="#A1AABB" stroke-width="1.4" stroke-dasharray="3 3" marker-end="url(#s20-arrow-m)"/>

  <!-- contexto creciente -->
  <text x="432" y="84" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CONTEXTO</text>

  <rect x="372" y="204" width="32" height="26" rx="4" fill="#7FB4CA" fill-opacity="0.85"/>

  <rect x="416" y="204" width="32" height="26" rx="4" fill="#232A36" stroke="#313342"/>
  <rect x="416" y="175" width="32" height="26" rx="4" fill="#7FB4CA" fill-opacity="0.85"/>

  <rect x="460" y="204" width="32" height="26" rx="4" fill="#232A36" stroke="#313342"/>
  <rect x="460" y="175" width="32" height="26" rx="4" fill="#232A36" stroke="#313342"/>
  <rect x="460" y="146" width="32" height="26" rx="4" fill="#7FB4CA" fill-opacity="0.85"/>

  <text x="388" y="246" text-anchor="middle" font-size="8" fill="#8394A3">1</text>
  <text x="432" y="246" text-anchor="middle" font-size="8" fill="#8394A3">2</text>
  <text x="476" y="246" text-anchor="middle" font-size="8" fill="#8394A3">3</text>
  <text x="432" y="264" text-anchor="middle" font-size="10" fill="#A1AABB">el contexto solo crece</text>

  <!-- chip inferior -->
  <rect x="90" y="300" width="340" height="28" rx="14" fill="#1c212c" stroke="#7FB4CA"/>
  <text x="260" y="318" text-anchor="middle" font-size="10" fill="#F3F6F9">cada iteración re-manda TODO → <tspan fill="#7FB4CA">caching = supervivencia</tspan></text>
</svg>
