  <text x="382" y="92" text-anchor="middle" font-size="10" letter-spacing="2" fill="#7AA89F">UNA MEMORIA CURADA</text>

  <rect x="280" y="102" width="204" height="22" rx="6" fill="#7AA89F" fill-opacity="0.1" stroke="#7AA89F" stroke-opacity="0.3"/>
  <text x="288" y="117" font-size="9"><tspan fill="#7AA89F" font-weight="600">WHAT</tspan><tspan fill="#A1AABB"> · qué se hizo</tspan></text>
  <rect x="280" y="130" width="204" height="22" rx="6" fill="#7AA89F" fill-opacity="0.1" stroke="#7AA89F" stroke-opacity="0.3"/>
  <text x="288" y="145" font-size="9"><tspan fill="#7AA89F" font-weight="600">WHY</tspan><tspan fill="#A1AABB"> · por qué</tspan></text>
  <rect x="280" y="158" width="204" height="22" rx="6" fill="#7AA89F" fill-opacity="0.1" stroke="#7AA89F" stroke-opacity="0.3"/>
  <text x="288" y="173" font-size="9"><tspan fill="#7AA89F" font-weight="600">WHERE</tspan><tspan fill="#A1AABB"> · dónde</tspan></text>
  <rect x="280" y="186" width="204" height="22" rx="6" fill="#7AA89F" fill-opacity="0.1" stroke="#7AA89F" stroke-opacity="0.3"/>
  <text x="288" y="201" font-size="9"><tspan fill="#7AA89F" font-weight="600">LEARNED</tspan><tspan fill="#A1AABB"> · gotchas</tspan></text>

  <rect x="280" y="220" width="150" height="22" rx="11" fill="#232A36" stroke="#313342"/>
  <text x="288" y="234" font-size="8" fill="#7AA89F">architecture/auth-model</text>
  <rect x="438" y="220" width="46" height="22" rx="11" fill="#232A36" stroke="#DFBD76"/>
  <text x="461" y="234" text-anchor="middle" font-size="8" fill="#DFBD76">rev 3</text>

  <!-- Evolución v1 → v3 -->
  <rect x="298" y="288" width="34" height="20" rx="6" fill="#232A36" stroke="#313342"/>
  <text x="315" y="301" text-anchor="middle" font-size="8" fill="#8394A3">v1</text>
  <path d="M336 298h16m0 0l-4-3m4 3l-4 3" stroke="#7AA89F" stroke-linecap="round"/>
  <rect x="356" y="288" width="34" height="20" rx="6" fill="#232A36" stroke="#313342"/>
  <text x="373" y="301" text-anchor="middle" font-size="8" fill="#A1AABB">v2</text>
  <path d="M394 298h16m0 0l-4-3m4 3l-4 3" stroke="#7AA89F" stroke-linecap="round"/>
  <rect x="414" y="288" width="34" height="20" rx="6" fill="#232A36" stroke="#7AA89F"/>
  <text x="431" y="301" text-anchor="middle" font-size="8" fill="#7AA89F">v3</text>
  <text x="382" y="326" text-anchor="middle" font-size="9" fill="#8394A3">la misma memoria evoluciona, no se duplica</text>
</svg>
