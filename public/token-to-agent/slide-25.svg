<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Diagrama de progressive disclosure: escalera de tres niveles que sube desde el índice hasta el contenido completo, cargando cada nivel solo si hace falta">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s25-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="s25-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#DFBD76"/>
    </marker>
  </defs>

  <text x="260" y="24" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">PATRÓN</text>
  <text x="260" y="46" text-anchor="middle" font-size="15" font-weight="600" fill="#F3F6F9">Progressive disclosure</text>

  <!-- step 1: índice -->
  <rect x="24" y="227" width="118" height="65" rx="10" fill="#1c212c" stroke="#313342"/>
  <line x1="30" y1="228.5" x2="136" y2="228.5" stroke="#DFBD76" stroke-width="2.5" stroke-linecap="round" filter="url(#s25-glow)"/>
  <text x="83" y="252" text-anchor="middle" font-size="12" font-weight="600" fill="#F3F6F9">ÍNDICE</text>
  <rect x="34" y="262" width="98" height="18" rx="9" fill="#232A36"/>
  <text x="83" y="274" text-anchor="middle" font-size="8" fill="#DFBD76">~decenas de tokens</text>

  <!-- arrow 1 -->
  <line x1="148" y1="238" x2="194" y2="208" stroke="#DFBD76" stroke-width="1.8" marker-end="url(#s25-arrow)"/>
  <text transform="rotate(-30 171 215)" x="171" y="212" text-anchor="middle" font-size="8" fill="#DFBD76">solo si hace falta</text>

  <!-- step 2: detalle -->
  <rect x="200" y="182" width="126" height="110" rx="10" fill="#1c212c" stroke="#313342"/>
  <line x1="206" y1="183.5" x2="320" y2="183.5" stroke="#DFBD76" stroke-width="2.5" stroke-linecap="round" filter="url(#s25-glow)"/>
  <text x="263" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#F3F6F9">DETALLE</text>
  <rect x="228" y="218" width="70" height="18" rx="9" fill="#232A36"/>
  <text x="263" y="230" text-anchor="middle" font-size="8" fill="#DFBD76">~cientos</text>
  <rect x="216" y="250" width="94" height="4" rx="2" fill="#313342"/>
  <rect x="216" y="262" width="72" height="4" rx="2" fill="#313342"/>
  <rect x="216" y="274" width="84" height="4" rx="2" fill="#313342"/>

  <!-- arrow 2 -->
  <line x1="332" y1="192" x2="378" y2="162" stroke="#DFBD76" stroke-width="1.8" marker-end="url(#s25-arrow)"/>
  <text transform="rotate(-30 355 169)" x="355" y="166" text-anchor="middle" font-size="8" fill="#DFBD76">solo si hace falta</text>

  <!-- step 3: contenido completo -->
  <rect x="384" y="132" width="118" height="160" rx="10" fill="#1c212c" stroke="#313342"/>
  <line x1="390" y1="133.5" x2="496" y2="133.5" stroke="#DFBD76" stroke-width="2.5" stroke-linecap="round" filter="url(#s25-glow)"/>
  <text x="443" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">CONTENIDO</text>
  <text x="443" y="173" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">COMPLETO</text>
  <rect x="415" y="184" width="56" height="18" rx="9" fill="#232A36"/>
  <text x="443" y="196" text-anchor="middle" font-size="8" fill="#DFBD76">~miles</text>
  <rect x="398" y="218" width="90" height="4" rx="2" fill="#313342"/>
  <rect x="398" y="230" width="74" height="4" rx="2" fill="#313342"/>
  <rect x="398" y="242" width="86" height="4" rx="2" fill="#313342"/>
  <rect x="398" y="254" width="64" height="4" rx="2" fill="#313342"/>
  <rect x="398" y="266" width="80" height="4" rx="2" fill="#313342"/>

  <!-- footer -->
  <text x="260" y="316" text-anchor="middle" font-size="9" fill="#8394A3">el patrón se repite en</text>
  <rect x="144" y="324" width="56" height="20" rx="10" fill="#232A36" stroke="#313342"/>
  <text x="172" y="337" text-anchor="middle" font-size="9" fill="#DFBD76">skills</text>
  <rect x="212" y="324" width="70" height="20" rx="10" fill="#232A36" stroke="#313342"/>
  <text x="247" y="337" text-anchor="middle" font-size="9" fill="#DFBD76">memoria</text>
  <rect x="294" y="324" width="82" height="20" rx="10" fill="#232A36" stroke="#313342"/>
  <text x="335" y="337" text-anchor="middle" font-size="9" fill="#DFBD76">delegación</text>
</svg>