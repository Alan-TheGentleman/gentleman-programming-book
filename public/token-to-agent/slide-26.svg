<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Amnesia de sesión: el conocimiento de la sesión uno se disuelve al cerrar la terminal y la sesión dos comienza vacía">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s26-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CONTEXTO VOLÁTIL</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Amnesia de sesión</text>

  <!-- Sesión 1 -->
  <rect x="24" y="78" width="176" height="200" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="112" y="102" text-anchor="middle" font-size="10" letter-spacing="2" fill="#FF8DD7">SESIÓN 1</text>
  <rect x="36" y="116" width="152" height="26" rx="8" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.35"/>
  <text x="44" y="133" font-size="9" fill="#F3F6F9">decisión: hexagonal</text>
  <rect x="36" y="150" width="152" height="26" rx="8" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.35"/>
  <text x="44" y="167" font-size="9" fill="#F3F6F9">root cause: race condition</text>
  <rect x="36" y="184" width="152" height="26" rx="8" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.35"/>
  <text x="44" y="201" font-size="9" fill="#F3F6F9">prefs: sin comentarios</text>
  <text x="112" y="258" text-anchor="middle" font-size="9" fill="#8394A3">conocimiento vivo</text>

  <!-- Cierre de terminal -->
  <rect x="246" y="86" width="28" height="28" rx="8" fill="#1c212c" stroke="#CB7C94" filter="url(#s26-glow)"/>
  <path d="M254 94l12 12M266 94l-12 12" stroke="#CB7C94" stroke-width="2" stroke-linecap="round"/>
  <text x="260" y="128" text-anchor="middle" font-size="8" fill="#CB7C94">cierre</text>

  <!-- Chips disolviéndose en el vacío -->
  <g font-size="8">
    <g opacity="0.5" transform="rotate(-4 260 155)">
      <rect x="214" y="146" width="92" height="18" rx="6" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.3"/>
      <text x="260" y="158" text-anchor="middle" fill="#F3F6F9">hexagonal…</text>
    </g>
    <g opacity="0.3" transform="rotate(3 260 189)">
      <rect x="208" y="180" width="104" height="18" rx="6" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.25"/>
      <text x="260" y="192" text-anchor="middle" fill="#F3F6F9">race condition…</text>
    </g>
    <g opacity="0.16">
      <rect x="212" y="214" width="96" height="18" rx="6" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.2"/>
      <text x="260" y="226" text-anchor="middle" fill="#F3F6F9">sin comentarios…</text>
    </g>
    <circle cx="238" cy="246" r="1.6" fill="#FF8DD7" opacity="0.35"/>
    <circle cx="262" cy="254" r="1.2" fill="#FF8DD7" opacity="0.25"/>
    <circle cx="284" cy="244" r="1" fill="#FF8DD7" opacity="0.18"/>
  </g>

  <!-- Sesión 2 -->
  <rect x="320" y="78" width="176" height="200" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="408" y="102" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">SESIÓN 2</text>
  <g stroke="#8394A3" stroke-width="1.5" opacity="0.35" stroke-linecap="round" stroke-linejoin="round">
    <path d="M395 146c-9 0-15 7-14 14-5 3-6 10-2 14-2 7 3 13 10 12 3 5 10 6 15 2 5 4 12 3 15-2 7 1 12-5 10-12 4-4 3-11-2-14 1-7-5-14-14-14-3-3-15-3-18 0z"/>
    <path d="M404 148v38M404 164c-4 0-7 3-7 6M404 176c4 0 7 2 7 5"/>
  </g>
  <text x="408" y="222" text-anchor="middle" font-size="18" fill="#FF8DD7" opacity="0.55">¿...?</text>
  <text x="408" y="258" text-anchor="middle" font-size="9" fill="#8394A3">empieza desde cero</text>

  <text x="260" y="322" text-anchor="middle" font-size="11" fill="#8394A3">la ventana es volátil por diseño</text>
</svg>
