<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Curva en U de recuperación según la posición del dato en el contexto: lost in the middle">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s16-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#CB7C94" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="260" y="26" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">POSICIÓN Y RECUPERACIÓN</text>
  <text x="260" y="48" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Lost in the middle</text>

  <!-- Chart card -->
  <rect x="45" y="62" width="430" height="236" rx="12" fill="#1c212c" stroke="#313342"/>

  <!-- Reference chip -->
  <rect x="366" y="70" width="100" height="16" rx="8" fill="#232A36" stroke="#313342"/>
  <text x="416" y="81" text-anchor="middle" font-size="8" fill="#8394A3">Liu et al. 2023</text>

  <!-- Risk zone band -->
  <rect x="195" y="88" width="150" height="167" fill="#CB7C94" opacity="0.1"/>
  <line x1="195" y1="88" x2="195" y2="255" stroke="#CB7C94" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <line x1="345" y1="88" x2="345" y2="255" stroke="#CB7C94" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
  <text x="270" y="243" text-anchor="middle" font-size="10" font-weight="600" fill="#CB7C94">zona de riesgo</text>

  <!-- Axes -->
  <line x1="90" y1="88" x2="90" y2="255" stroke="#313342" stroke-width="1.5"/>
  <line x1="90" y1="255" x2="450" y2="255" stroke="#313342" stroke-width="1.5"/>
  <text x="84" y="96" text-anchor="end" font-size="8" fill="#8394A3">alta</text>
  <text x="84" y="252" text-anchor="end" font-size="8" fill="#8394A3">baja</text>
  <text transform="rotate(-90 62 172)" x="62" y="172" text-anchor="middle" font-size="9" fill="#8394A3">recuperación</text>

  <!-- Area under curve -->
  <path d="M90 105 C170 112 195 218 270 218 C345 218 370 112 450 105 L450 255 L90 255 Z" fill="#CB7C94" opacity="0.06"/>

  <!-- U-shaped curve -->
  <path d="M90 105 C170 112 195 218 270 218 C345 218 370 112 450 105" stroke="#CB7C94" stroke-width="2.5" stroke-linecap="round" filter="url(#s16-glow)"/>

  <!-- Markers -->
  <circle cx="90" cy="105" r="4" fill="#B7CC85"/>
  <circle cx="450" cy="105" r="4" fill="#B7CC85"/>
  <circle cx="270" cy="218" r="4" fill="#CB7C94"/>

  <!-- X axis label -->
  <text x="270" y="274" text-anchor="middle" font-size="9" fill="#8394A3">posición del dato en el contexto (inicio → medio → final)</text>

  <!-- Footer -->
  <text x="260" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#F3F6F9">chico y relevante <tspan fill="#CB7C94">&gt;</tspan> grande y sucio</text>
</svg>
