<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="El prompt monolítico: un archivo de reglas enorme ocupa casi toda la context window y deja un espacio mínimo para tu código">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s23-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="s23-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1 L7 4 L1 7" stroke="#CB7C94" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Encabezado -->
  <text x="260" y="34" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CONTEXT WINDOW</text>
  <text x="260" y="56" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">El prompt monolítico</text>

  <!-- Barra de context window -->
  <rect x="40" y="78" width="440" height="120" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="52" y="96" font-size="9" letter-spacing="1.5" fill="#A1AABB">CAPACIDAD TOTAL</text>

  <!-- Bloque monolítico rojo -->
  <rect x="52" y="104" width="356" height="82" rx="8" fill="#CB7C94" fill-opacity="0.14" stroke="#CB7C94" stroke-width="1.5" filter="url(#s23-glow)"/>
  <text x="230" y="140" text-anchor="middle" font-size="15" font-weight="600" fill="#F3F6F9">REGLAS.md</text>
  <text x="230" y="160" text-anchor="middle" font-size="10" fill="#CB7C94">2.400 líneas · SIEMPRE cargado</text>

  <!-- Espacio restante minúsculo -->
  <rect x="416" y="104" width="56" height="82" rx="8" fill="#232A36" stroke="#313342" stroke-dasharray="4 3"/>
  <text x="444" y="136" text-anchor="middle" font-size="8" fill="#8394A3">espacio</text>
  <text x="444" y="148" text-anchor="middle" font-size="8" fill="#8394A3">para tu</text>
  <text x="444" y="160" text-anchor="middle" font-size="8" fill="#8394A3">código</text>

  <!-- Conectores hacia consecuencias -->
  <line x1="102" y1="202" x2="102" y2="230" stroke="#CB7C94" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#s23-arrow)"/>
  <line x1="266" y1="202" x2="266" y2="230" stroke="#CB7C94" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#s23-arrow)"/>
  <line x1="424" y1="202" x2="424" y2="230" stroke="#CB7C94" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#s23-arrow)"/>

  <!-- Chips de consecuencias -->
  <rect x="34" y="238" width="136" height="32" rx="14" fill="#1c212c" stroke="#313342"/>
  <circle cx="52" cy="254" r="7" stroke="#CB7C94" stroke-width="1.2"/>
  <text x="52" y="257.5" text-anchor="middle" font-size="10" font-weight="600" fill="#CB7C94">!</text>
  <text x="66" y="258" font-size="10" fill="#A1AABB">menos espacio útil</text>

  <rect x="190" y="238" width="152" height="32" rx="14" fill="#1c212c" stroke="#313342"/>
  <circle cx="208" cy="254" r="7" stroke="#CB7C94" stroke-width="1.2"/>
  <text x="208" y="257.5" text-anchor="middle" font-size="10" font-weight="600" fill="#CB7C94">!</text>
  <text x="222" y="258" font-size="10" fill="#A1AABB">compactación temprana</text>

  <rect x="362" y="238" width="124" height="32" rx="14" fill="#1c212c" stroke="#313342"/>
  <circle cx="380" cy="254" r="7" stroke="#CB7C94" stroke-width="1.2"/>
  <text x="380" y="257.5" text-anchor="middle" font-size="10" font-weight="600" fill="#CB7C94">!</text>
  <text x="394" y="258" font-size="10" fill="#A1AABB">atención diluida</text>

  <!-- Cierre -->
  <text x="260" y="312" text-anchor="middle" font-size="10" fill="#8394A3">cada token fijo compite con tu tarea</text>
</svg>
