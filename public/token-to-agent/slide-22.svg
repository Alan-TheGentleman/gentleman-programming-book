<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="El system prompt como producto: archivos Markdown versionados que alimentan a un agente y le dan cualidades de software">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s22-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="s22-arrow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M1 1L5 3L1 5" stroke="#FF8DD7" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="260" y="26" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">SYSTEM PROMPT</text>
  <text x="260" y="46" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">El system prompt como producto</text>

  <text x="105" y="70" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">ARCHIVOS</text>
  <text x="425" y="70" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CUALIDADES</text>

  <!-- Stack de archivos Markdown -->
  <rect x="30" y="80" width="150" height="34" rx="8" fill="#1c212c" stroke="#313342"/>
  <rect x="40" y="88" width="11" height="15" rx="2" stroke="#A3B5D6" fill="none"/>
  <path d="M43 94 h5 M43 98 h5" stroke="#A3B5D6" stroke-width="1" opacity="0.8"/>
  <text x="58" y="101" font-family="monospace" font-size="9" fill="#F3F6F9">persona.md</text>
  <rect x="136" y="89" width="36" height="15" rx="7" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.6"/>
  <text x="154" y="100" text-anchor="middle" font-size="8" fill="#FF8DD7">v2.0</text>

  <rect x="30" y="122" width="150" height="34" rx="8" fill="#1c212c" stroke="#313342"/>
  <rect x="40" y="130" width="11" height="15" rx="2" stroke="#A3B5D6" fill="none"/>
  <path d="M43 136 h5 M43 140 h5" stroke="#A3B5D6" stroke-width="1" opacity="0.8"/>
  <text x="58" y="143" font-family="monospace" font-size="9" fill="#F3F6F9">reglas.md</text>
  <rect x="136" y="131" width="36" height="15" rx="7" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.6"/>
  <text x="154" y="142" text-anchor="middle" font-size="8" fill="#FF8DD7">v1.4</text>

  <rect x="30" y="164" width="150" height="34" rx="8" fill="#1c212c" stroke="#313342"/>
  <rect x="40" y="172" width="11" height="15" rx="2" stroke="#A3B5D6" fill="none"/>
  <path d="M43 178 h5 M43 182 h5" stroke="#A3B5D6" stroke-width="1" opacity="0.8"/>
  <text x="58" y="185" font-family="monospace" font-size="9" fill="#F3F6F9">delegacion.md</text>
  <rect x="136" y="173" width="36" height="15" rx="7" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.6"/>
  <text x="154" y="184" text-anchor="middle" font-size="8" fill="#FF8DD7">v1.2</text>

  <rect x="30" y="206" width="150" height="34" rx="8" fill="#1c212c" stroke="#313342"/>
  <rect x="40" y="214" width="11" height="15" rx="2" stroke="#A3B5D6" fill="none"/>
  <path d="M43 220 h5 M43 224 h5" stroke="#A3B5D6" stroke-width="1" opacity="0.8"/>
  <text x="58" y="227" font-family="monospace" font-size="9" fill="#F3F6F9">memoria.md</text>
  <rect x="136" y="215" width="36" height="15" rx="7" fill="#232A36" stroke="#FF8DD7" stroke-opacity="0.6"/>
  <text x="154" y="226" text-anchor="middle" font-size="8" fill="#FF8DD7">v1.1</text>

  <!-- Flecha hacia el agente -->
  <line x1="185" y1="157" x2="212" y2="157" stroke="#FF8DD7" stroke-width="1.5" marker-end="url(#s22-arrow)"/>

  <!-- Terminal / agente -->
  <rect x="220" y="112" width="105" height="90" rx="10" fill="#1c212c" stroke="#FF8DD7" filter="url(#s22-glow)"/>
  <circle cx="234" cy="126" r="3" fill="#313342"/>
  <circle cx="245" cy="126" r="3" fill="#313342"/>
  <circle cx="256" cy="126" r="3" fill="#313342"/>
  <line x1="220" y1="136" x2="325" y2="136" stroke="#313342"/>
  <text x="252" y="168" font-family="monospace" font-size="16" fill="#FF8DD7">&gt;_</text>
  <text x="272" y="190" text-anchor="middle" font-size="9" letter-spacing="2" fill="#A1AABB">AGENTE</text>

  <!-- Conectores hacia cualidades -->
  <line x1="325" y1="135" x2="365" y2="97" stroke="#FF8DD7" stroke-opacity="0.35" stroke-width="1.2"/>
  <line x1="325" y1="150" x2="365" y2="137" stroke="#FF8DD7" stroke-opacity="0.35" stroke-width="1.2"/>
  <line x1="325" y1="165" x2="365" y2="177" stroke="#FF8DD7" stroke-opacity="0.35" stroke-width="1.2"/>
  <line x1="325" y1="180" x2="365" y2="217" stroke="#FF8DD7" stroke-opacity="0.35" stroke-width="1.2"/>

  <!-- Cualidades -->
  <rect x="365" y="84" width="120" height="26" rx="13" fill="#1c212c" stroke="#FF8DD7"/>
  <text x="425" y="101" text-anchor="middle" font-size="10" fill="#FF8DD7">versionable</text>
  <rect x="365" y="124" width="120" height="26" rx="13" fill="#1c212c" stroke="#FF8DD7"/>
  <text x="425" y="141" text-anchor="middle" font-size="10" fill="#FF8DD7">diffeable</text>
  <rect x="365" y="164" width="120" height="26" rx="13" fill="#1c212c" stroke="#FF8DD7"/>
  <text x="425" y="181" text-anchor="middle" font-size="10" fill="#FF8DD7">testeable</text>
  <rect x="365" y="204" width="120" height="26" rx="13" fill="#1c212c" stroke="#FF8DD7"/>
  <text x="425" y="221" text-anchor="middle" font-size="10" fill="#FF8DD7">instalable</text>

  <!-- Footer -->
  <rect x="100" y="316" width="320" height="28" rx="14" fill="#1c212c" stroke="#FF8DD7"/>
  <text x="260" y="334" text-anchor="middle" font-size="10" fill="#F3F6F9">el comportamiento vive en <tspan fill="#FF8DD7">el texto</tspan>, no en el binario</text>
</svg>
