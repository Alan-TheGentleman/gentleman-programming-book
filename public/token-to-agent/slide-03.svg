<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Parámetros, VRAM y MoE: la VRAM necesaria crece con los parámetros, y en MoE solo algunos expertos se activan por token">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s03-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">TAMAÑO DE MODELOS</text>
  <text x="260" y="48" text-anchor="middle" font-size="15" font-weight="600" fill="#F3F6F9">Parámetros, VRAM y MoE</text>

  <!-- Formula chip -->
  <rect x="155" y="58" width="210" height="28" rx="14" fill="#1c212c" stroke="#313342"/>
  <text x="260" y="76" text-anchor="middle" font-size="11" font-weight="600" fill="#DFBD76">VRAM ≈ parámetros × bytes</text>

  <!-- Card 7B -->
  <rect x="20" y="98" width="235" height="90" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="38" y="124" font-size="13" font-weight="600" fill="#F3F6F9">7B → 14 GB</text>
  <text x="38" y="142" font-size="9" fill="#8394A3">entra en una notebook</text>
  <rect x="38" y="156" width="200" height="12" rx="6" fill="#232A36"/>
  <rect x="38" y="156" width="20" height="12" rx="6" fill="#A3B5D6"/>

  <!-- Card 70B -->
  <rect x="265" y="98" width="235" height="90" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="283" y="124" font-size="13" font-weight="600" fill="#F3F6F9">70B → 140 GB</text>
  <text x="283" y="142" font-size="9" fill="#8394A3">necesita GPU seria</text>
  <rect x="283" y="156" width="200" height="12" rx="6" fill="#232A36"/>
  <rect x="283" y="156" width="197" height="12" rx="6" fill="#A3B5D6" opacity="0.4" filter="url(#s03-glow)"/>
  <rect x="283" y="156" width="197" height="12" rx="6" fill="#A3B5D6"/>

  <!-- MoE panel -->
  <rect x="20" y="200" width="480" height="130" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="260" y="224" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">MIXTURE OF EXPERTS (MOE)</text>

  <!-- Experts grid: 8 squares, 2 lit -->
  <rect x="91" y="240" width="30" height="30" rx="7" fill="#232A36" stroke="#313342"/>
  <text x="106" y="259" text-anchor="middle" font-size="9" fill="#8394A3">E1</text>
  <rect x="135" y="240" width="30" height="30" rx="7" fill="#232A36" stroke="#313342"/>
  <text x="150" y="259" text-anchor="middle" font-size="9" fill="#8394A3">E2</text>
  <rect x="179" y="240" width="30" height="30" rx="7" fill="#A3B5D6" opacity="0.5" filter="url(#s03-glow)"/>
  <rect x="179" y="240" width="30" height="30" rx="7" fill="#A3B5D6"/>
  <text x="194" y="259" text-anchor="middle" font-size="9" font-weight="600" fill="#1c212c">E3</text>
  <rect x="223" y="240" width="30" height="30" rx="7" fill="#232A36" stroke="#313342"/>
  <text x="238" y="259" text-anchor="middle" font-size="9" fill="#8394A3">E4</text>
  <rect x="267" y="240" width="30" height="30" rx="7" fill="#232A36" stroke="#313342"/>
  <text x="282" y="259" text-anchor="middle" font-size="9" fill="#8394A3">E5</text>
  <rect x="311" y="240" width="30" height="30" rx="7" fill="#A3B5D6" opacity="0.5" filter="url(#s03-glow)"/>
  <rect x="311" y="240" width="30" height="30" rx="7" fill="#A3B5D6"/>
  <text x="326" y="259" text-anchor="middle" font-size="9" font-weight="600" fill="#1c212c">E6</text>
  <rect x="355" y="240" width="30" height="30" rx="7" fill="#232A36" stroke="#313342"/>
  <text x="370" y="259" text-anchor="middle" font-size="9" fill="#8394A3">E7</text>
  <rect x="399" y="240" width="30" height="30" rx="7" fill="#232A36" stroke="#313342"/>
  <text x="414" y="259" text-anchor="middle" font-size="9" fill="#8394A3">E8</text>

  <text x="260" y="296" text-anchor="middle" font-size="10" fill="#F3F6F9">MoE: solo algunos expertos se activan por token</text>
  <text x="260" y="312" text-anchor="middle" font-size="9" fill="#8394A3">menos cómputo activo, misma capacidad total</text>
</svg>
