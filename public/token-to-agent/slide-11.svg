<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Comparación sin cache y con KV cache: sin cache cada paso recalcula todos los K y V, con cache el nuevo token solo agrega una celda en VRAM">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s11-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="s11-arr-red" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#CB7C94"/></marker>
    <marker id="s11-arr-cyan" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#7AA89F"/></marker>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">MEMORIA DE INFERENCIA</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">KV cache: por qué existe</text>

  <!-- SIN CACHE -->
  <rect x="20" y="66" width="324" height="128" rx="12" fill="#1c212c" stroke="#CB7C94" stroke-opacity="0.45"/>
  <text x="36" y="90" font-size="10" letter-spacing="2" fill="#CB7C94">SIN CACHE</text>
  <text x="330" y="90" text-anchor="end" font-size="10" fill="#CB7C94">✕ trabajo repetido</text>

  <path d="M277 146 Q182 88 87 146" stroke="#CB7C94" stroke-opacity="0.65" fill="none" marker-end="url(#s11-arr-red)"/>
  <path d="M277 146 Q201 96 125 146" stroke="#CB7C94" stroke-opacity="0.65" fill="none" marker-end="url(#s11-arr-red)"/>
  <path d="M277 146 Q220 104 163 146" stroke="#CB7C94" stroke-opacity="0.65" fill="none" marker-end="url(#s11-arr-red)"/>
  <path d="M277 146 Q239 112 201 146" stroke="#CB7C94" stroke-opacity="0.65" fill="none" marker-end="url(#s11-arr-red)"/>
  <path d="M277 146 Q258 122 239 146" stroke="#CB7C94" stroke-opacity="0.65" fill="none" marker-end="url(#s11-arr-red)"/>

  <g fill="#232A36" stroke="#313342">
    <rect x="72" y="146" width="30" height="24" rx="5"/><rect x="110" y="146" width="30" height="24" rx="5"/><rect x="148" y="146" width="30" height="24" rx="5"/><rect x="186" y="146" width="30" height="24" rx="5"/><rect x="224" y="146" width="30" height="24" rx="5"/>
  </g>
  <rect x="262" y="146" width="30" height="24" rx="5" fill="#232A36" stroke="#CB7C94"/>
  <text x="87" y="162" text-anchor="middle" font-size="7" fill="#8394A3">K V</text>
  <text x="125" y="162" text-anchor="middle" font-size="7" fill="#8394A3">K V</text>
  <text x="163" y="162" text-anchor="middle" font-size="7" fill="#8394A3">K V</text>
  <text x="201" y="162" text-anchor="middle" font-size="7" fill="#8394A3">K V</text>
  <text x="239" y="162" text-anchor="middle" font-size="7" fill="#8394A3">K V</text>
  <text x="277" y="162" text-anchor="middle" font-size="9" fill="#F3F6F9">N</text>
  <text x="182" y="186" text-anchor="middle" font-size="9" fill="#8394A3">cada paso recalcula todos los K,V anteriores</text>

  <!-- CON CACHE -->
  <rect x="20" y="206" width="324" height="132" rx="12" fill="#1c212c" stroke="#7AA89F" stroke-opacity="0.45"/>
  <text x="36" y="228" font-size="10" letter-spacing="2" fill="#7AA89F">CON CACHE</text>

  <rect x="36" y="238" width="204" height="84" rx="8" fill="#232A36" stroke="#7AA89F"/>
  <text x="138" y="254" text-anchor="middle" font-size="8" letter-spacing="1.5" fill="#7AA89F">KV CACHE · VRAM</text>
  <g>
    <rect x="55" y="262" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="73" y="262" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
    <rect x="99" y="262" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="117" y="262" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
    <rect x="143" y="262" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="161" y="262" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
    <rect x="187" y="262" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="205" y="262" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
    <rect x="55" y="284" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="73" y="284" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
    <rect x="99" y="284" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="117" y="284" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
    <rect x="143" y="284" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.7"/><rect x="161" y="284" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.7"/>
  </g>
  <!-- new cell added by the new token -->
  <rect x="187" y="284" width="16" height="14" rx="3" fill="#DFBD76" fill-opacity="0.3" stroke="#DFBD76"/>
  <rect x="205" y="284" width="16" height="14" rx="3" fill="#B7CC85" fill-opacity="0.3" stroke="#B7CC85"/>
  <rect x="184" y="281" width="42" height="20" rx="4" fill="none" stroke="#7AA89F" filter="url(#s11-glow)"/>

  <rect x="260" y="279" width="68" height="28" rx="8" fill="#1c212c" stroke="#7AA89F"/>
  <text x="294" y="297" text-anchor="middle" font-size="9" fill="#F3F6F9">token N</text>
  <line x1="256" y1="293" x2="234" y2="293" stroke="#7AA89F" stroke-width="1.5" marker-end="url(#s11-arr-cyan)"/>
  <text x="182" y="334" text-anchor="middle" font-size="9" fill="#8394A3">el nuevo token solo agrega una celda</text>

  <!-- side stats -->
  <text x="430" y="88" text-anchor="middle" font-size="9" letter-spacing="2" fill="#A1AABB">EN NÚMEROS</text>
  <rect x="356" y="100" width="148" height="44" rx="9" fill="#1c212c" stroke="#313342"/>
  <text x="430" y="119" text-anchor="middle" font-size="10" fill="#F3F6F9">8B · 8k contexto</text>
  <text x="430" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#7AA89F">≈ 1 GB VRAM</text>

  <rect x="356" y="156" width="148" height="44" rx="9" fill="#1c212c" stroke="#313342"/>
  <text x="430" y="175" text-anchor="middle" font-size="10" font-weight="600" fill="#F3F6F9">GQA/MQA</text>
  <text x="430" y="191" text-anchor="middle" font-size="9" fill="#A1AABB">menos cabezas K/V</text>

  <rect x="356" y="212" width="148" height="44" rx="9" fill="#1c212c" stroke="#313342"/>
  <rect x="370" y="238" width="8" height="8" rx="2" fill="#7AA89F" fill-opacity="0.4"/>
  <rect x="382" y="232" width="8" height="14" rx="2" fill="#7AA89F" fill-opacity="0.6"/>
  <rect x="394" y="226" width="8" height="20" rx="2" fill="#7AA89F" fill-opacity="0.9"/>
  <text x="414" y="233" font-size="9" fill="#A1AABB">crece con</text>
  <text x="414" y="245" font-size="9" fill="#A1AABB">el contexto</text>
</svg>
