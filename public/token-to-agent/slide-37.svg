<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Comparación entre vibe coding sin rumbo y desarrollo guiado por specs con fases y artefactos">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s37-glow" x="-50%" y="-50%" width="200%" height="200%">
