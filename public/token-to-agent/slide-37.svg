  <text x="200" y="110" font-size="12" fill="#CB7C94" fill-opacity="0.8">?</text>
  <text x="55" y="180" font-size="12" fill="#CB7C94" fill-opacity="0.8">?</text>

  <rect x="70" y="214" width="126" height="62" rx="8" fill="#1c212c" stroke="#CB7C94" stroke-opacity="0.6"/>
  <rect x="70" y="214" width="126" height="62" rx="8" fill="#CB7C94" fill-opacity="0.05"/>
  <rect x="82" y="226" width="70" height="4" rx="2" fill="#8394A3"/>
