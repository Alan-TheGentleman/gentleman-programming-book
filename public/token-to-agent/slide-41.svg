<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Flujo de jueces ciegos adversariales con síntesis, fix agent y loop de re-judge hasta aprobar o escalar">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s41-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#CB7C94" flood-opacity="0.35"/>
    </filter>
    <marker id="s41-arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#A1AABB"/>
    </marker>
    <marker id="s41-arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#CB7C94"/>
    </marker>
    <marker id="s41-arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B7CC85"/>
    </marker>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">JUDGMENT DAY</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Jueces ciegos adversariales</text>

  <!-- diff -->
  <rect x="18" y="128" width="52" height="24" rx="8" fill="#1c212c" stroke="#CB7C94"/>
  <text x="44" y="144" text-anchor="middle" font-size="10" fill="#F3F6F9">diff</text>
  <line x1="70" y1="134" x2="104" y2="104" stroke="#A1AABB" stroke-width="1.2" marker-end="url(#s41-arrow)"/>
  <line x1="70" y1="146" x2="104" y2="176" stroke="#A1AABB" stroke-width="1.2" marker-end="url(#s41-arrow)"/>

  <!-- Jueces -->
  <g filter="url(#s41-glow)">
    <rect x="108" y="82" width="88" height="36" rx="8" fill="#1c212c" stroke="#CB7C94"/>
    <rect x="108" y="162" width="88" height="36" rx="8" fill="#1c212c" stroke="#CB7C94"/>
  </g>
  <text x="152" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#F3F6F9">JUEZ A</text>
  <text x="152" y="110" text-anchor="middle" font-size="8" fill="#8394A3">ciego</text>
  <text x="152" y="177" text-anchor="middle" font-size="10" font-weight="600" fill="#F3F6F9">JUEZ B</text>
  <text x="152" y="190" text-anchor="middle" font-size="8" fill="#8394A3">ciego</text>
  <line x1="108" y1="140" x2="196" y2="140" stroke="#CB7C94" stroke-dasharray="4 4" stroke-opacity="0.8"/>
  <text x="152" y="134" text-anchor="middle" font-size="8" fill="#CB7C94">no se ven</text>

  <!-- Síntesis -->
  <line x1="196" y1="100" x2="242" y2="124" stroke="#A1AABB" stroke-width="1.2" marker-end="url(#s41-arrow)"/>
  <line x1="196" y1="180" x2="242" y2="156" stroke="#A1AABB" stroke-width="1.2" marker-end="url(#s41-arrow)"/>
  <polygon points="262,112 292,140 262,168 232,140" fill="#1c212c" stroke="#CB7C94"/>
  <text x="262" y="143" text-anchor="middle" font-size="8" fill="#F3F6F9">síntesis</text>

  <!-- Salidas -->
  <line x1="292" y1="140" x2="316" y2="90" stroke="#CB7C94" stroke-width="1.2" marker-end="url(#s41-arrow-red)"/>
  <line x1="292" y1="140" x2="316" y2="140" stroke="#DFBD76" stroke-width="1.2" marker-end="url(#s41-arrow)"/>
  <line x1="292" y1="140" x2="316" y2="190" stroke="#B7CC85" stroke-width="1.2" marker-end="url(#s41-arrow-green)"/>

  <rect x="322" y="78" width="84" height="20" rx="10" fill="#1c212c" stroke="#CB7C94"/>
  <text x="364" y="91" text-anchor="middle" font-size="9" fill="#CB7C94">escala</text>
  <rect x="322" y="130" width="84" height="20" rx="10" fill="#1c212c" stroke="#DFBD76"/>
  <text x="364" y="143" text-anchor="middle" font-size="9" fill="#DFBD76">sospechoso</text>
  <rect x="322" y="182" width="84" height="20" rx="10" fill="#1c212c" stroke="#B7CC85"/>
  <text x="364" y="195" text-anchor="middle" font-size="9" fill="#B7CC85">confirmado</text>

  <!-- Terminales -->
  <line x1="406" y1="88" x2="426" y2="88" stroke="#CB7C94" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#s41-arrow-red)"/>
  <rect x="430" y="78" width="76" height="20" rx="10" fill="#CB7C94" fill-opacity="0.15" stroke="#CB7C94"/>
  <text x="468" y="91" text-anchor="middle" font-size="9" font-weight="600" fill="#CB7C94">ESCALADO</text>
  <line x1="406" y1="192" x2="426" y2="192" stroke="#B7CC85" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#s41-arrow-green)"/>
  <rect x="430" y="182" width="76" height="20" rx="10" fill="#B7CC85" fill-opacity="0.15" stroke="#B7CC85"/>
  <text x="468" y="195" text-anchor="middle" font-size="9" font-weight="600" fill="#B7CC85">APROBADO</text>

  <!-- Fix agent -->
  <line x1="364" y1="202" x2="364" y2="234" stroke="#B7CC85" stroke-width="1.2" marker-end="url(#s41-arrow-green)"/>
  <rect x="252" y="238" width="200" height="34" rx="8" fill="#1c212c" stroke="#B7CC85"/>
  <text x="352" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#F3F6F9">FIX AGENT</text>
  <text x="352" y="265" text-anchor="middle" font-size="8" fill="#A1AABB">(aplica SOLO lo confirmado)</text>

  <!-- Loop re-judge -->
  <path d="M252,255 H185 Q166,255 166,236 V210" stroke="#CB7C94" stroke-width="1.2" fill="none" marker-end="url(#s41-arrow-red)"/>
  <text x="212" y="249" text-anchor="middle" font-size="8" fill="#CB7C94">re-judge</text>

  <text x="352" y="290" text-anchor="middle" font-size="8" fill="#A1AABB">tras 2 iteraciones → pregunta al humano</text>

  <text x="260" y="334" text-anchor="middle" font-size="11" fill="#CB7C94">el que revisa no es el que escribió</text>
</svg>