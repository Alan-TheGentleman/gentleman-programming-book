<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Anatomía de una memoria de agente: el agente se conecta por MCP a un almacenamiento durable con búsqueda full-text, la ventana es RAM y la memoria es disco">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s27-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">PERSISTENCIA</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Anatomía de una memoria de agente</text>

  <!-- Agente -->
  <rect x="162" y="64" width="100" height="28" rx="9" fill="#1c212c" stroke="#7FB4CA" filter="url(#s27-glow)"/>
  <text x="212" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">AGENTE</text>

  <!-- Pipe MCP -->
  <line x1="212" y1="92" x2="212" y2="132" stroke="#7FB4CA" stroke-width="2"/>
  <circle cx="212" cy="112" r="3" fill="#7FB4CA"/>
  <text x="222" y="116" font-size="9" fill="#7FB4CA">MCP (protocolo estándar)</text>

  <!-- Caja de memoria -->
  <rect x="70" y="132" width="284" height="156" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="212" y="152" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">MEMORIA PERSISTENTE</text>

  <rect x="84" y="162" width="256" height="50" rx="8" fill="#232A36" stroke="#313342"/>
  <ellipse cx="106" cy="179" rx="9" ry="3.5" stroke="#7FB4CA" stroke-width="1.5"/>
  <path d="M97 179v14c0 2 4 3.5 9 3.5s9-1.5 9-3.5v-14" stroke="#7FB4CA" stroke-width="1.5"/>
  <text x="126" y="183" font-size="10" font-weight="600" fill="#F3F6F9">STORAGE DURABLE</text>
  <text x="126" y="199" font-size="9" fill="#8394A3">(SQLite) · sobrevive al reinicio</text>

  <rect x="84" y="222" width="256" height="50" rx="8" fill="#232A36" stroke="#313342"/>
  <circle cx="104" cy="241" r="6.5" stroke="#7FB4CA" stroke-width="1.5"/>
  <path d="M109 246l6 6" stroke="#7FB4CA" stroke-width="1.5" stroke-linecap="round"/>
  <text x="126" y="243" font-size="10" font-weight="600" fill="#F3F6F9">BÚSQUEDA FULL-TEXT + RANKING</text>
  <text x="126" y="259" font-size="9" fill="#8394A3">(FTS5/BM25)</text>

  <!-- Analogía -->
  <rect x="368" y="170" width="132" height="46" rx="10" fill="#1c212c" stroke="#DFBD76"/>
  <text x="434" y="189" text-anchor="middle" font-size="10" font-weight="600" fill="#DFBD76">ventana = RAM</text>
  <text x="434" y="205" text-anchor="middle" font-size="8" fill="#8394A3">volátil</text>

  <rect x="368" y="232" width="132" height="46" rx="10" fill="#1c212c" stroke="#7FB4CA" filter="url(#s27-glow)"/>
  <text x="434" y="251" text-anchor="middle" font-size="10" font-weight="600" fill="#7FB4CA">memoria = disco</text>
  <text x="434" y="267" text-anchor="middle" font-size="8" fill="#8394A3">durable</text>

  <line x1="354" y1="193" x2="368" y2="193" stroke="#313342" stroke-dasharray="3 3"/>
  <line x1="354" y1="255" x2="368" y2="255" stroke="#313342" stroke-dasharray="3 3"/>

  <text x="260" y="322" text-anchor="middle" font-size="11" fill="#8394A3">local-first: tu conocimiento no depende de un servidor ajeno</text>
</svg>
