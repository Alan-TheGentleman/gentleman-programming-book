<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="La API es stateless: el modelo no recuerda nada entre llamadas, así que cada request re-envía el system prompt y todo el historial">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s04-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">LLM API</text>
  <text x="260" y="48" text-anchor="middle" font-size="15" font-weight="600" fill="#F3F6F9">La API no recuerda nada entre llamadas</text>

  <!-- Model chip with crossed-out memory -->
  <rect x="175" y="58" width="170" height="34" rx="17" fill="#1c212c" stroke="#CB7C94" stroke-opacity="0.7"/>
  <rect x="192" y="66" width="18" height="18" rx="3" fill="#232A36" stroke="#8394A3"/>
  <rect x="196" y="70" width="10" height="10" rx="2" stroke="#8394A3" stroke-width="1"/>
  <g filter="url(#s04-glow)" opacity="0.6">
    <line x1="189" y1="63" x2="213" y2="87" stroke="#CB7C94" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="213" y1="63" x2="189" y2="87" stroke="#CB7C94" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <line x1="189" y1="63" x2="213" y2="87" stroke="#CB7C94" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="213" y1="63" x2="189" y2="87" stroke="#CB7C94" stroke-width="2.5" stroke-linecap="round"/>
  <text x="280" y="79" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1" fill="#F3F6F9">MODELO</text>
  <text x="260" y="108" text-anchor="middle" font-size="10" fill="#CB7C94">el modelo no recuerda nada entre llamadas</text>

  <!-- Request 1 -->
  <rect x="25" y="122" width="210" height="92" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="41" y="142" font-size="10" letter-spacing="2" fill="#A1AABB">REQUEST 1</text>
  <rect x="41" y="152" width="178" height="18" rx="4" fill="#232A36" stroke="#313342"/>
  <text x="49" y="165" font-size="9" fill="#A1AABB">system</text>
  <rect x="41" y="176" width="178" height="18" rx="4" fill="#232A36" stroke="#313342"/>
  <text x="49" y="189" font-size="9" fill="#A1AABB">mensaje 1</text>

  <!-- Arrow between requests -->
  <line x1="242" y1="168" x2="266" y2="168" stroke="#8394A3" stroke-width="1.5"/>
  <path d="M266 163 L274 168 L266 173 Z" fill="#8394A3"/>

  <!-- Request 2 -->
  <rect x="280" y="122" width="215" height="162" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="296" y="142" font-size="10" letter-spacing="2" fill="#A1AABB">REQUEST 2</text>
  <text x="485" y="142" text-anchor="end" font-size="8" fill="#CB7C94">historial repetido</text>
  <rect x="296" y="152" width="183" height="18" rx="4" fill="#232A36" stroke="#313342"/>
  <text x="304" y="165" font-size="9" fill="#A1AABB">system</text>
  <rect x="296" y="176" width="183" height="18" rx="4" fill="#232A36" stroke="#313342"/>
  <text x="304" y="189" font-size="9" fill="#A1AABB">mensaje 1</text>
  <rect x="296" y="200" width="183" height="18" rx="4" fill="#232A36" stroke="#313342"/>
  <text x="304" y="213" font-size="9" fill="#A1AABB">respuesta 1</text>
  <!-- Repeated portion highlight -->
  <rect x="290" y="146" width="195" height="76" rx="6" stroke="#CB7C94" stroke-dasharray="4 4" stroke-opacity="0.9"/>
  <!-- New message -->
  <rect x="296" y="228" width="183" height="18" rx="4" fill="#232A36" stroke="#CB7C94"/>
  <text x="304" y="241" font-size="9" fill="#A1AABB">mensaje 2</text>
  <text x="471" y="241" text-anchor="end" font-size="8" fill="#CB7C94">nuevo</text>
  <text x="387" y="268" text-anchor="middle" font-size="9" fill="#CB7C94">todo se re-envía en cada llamada</text>

  <!-- Question chips -->
  <rect x="20" y="308" width="160" height="26" rx="13" fill="#1c212c" stroke="#313342"/>
  <text x="100" y="325" text-anchor="middle" font-size="9" fill="#A1AABB">¿quién paga re-mandar todo?</text>
  <rect x="190" y="308" width="160" height="26" rx="13" fill="#1c212c" stroke="#313342"/>
  <text x="270" y="325" text-anchor="middle" font-size="9" fill="#A1AABB">¿qué pasa cuando no entra?</text>
  <rect x="360" y="308" width="140" height="26" rx="13" fill="#1c212c" stroke="#313342"/>
  <text x="430" y="325" text-anchor="middle" font-size="9" fill="#A1AABB">¿cómo recordamos?</text>
</svg>
