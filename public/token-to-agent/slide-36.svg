<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Model routing: cada fase de la pipeline usa un modelo de distinta potencia, el más potente solo donde hay decisiones">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s36-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#A3B5D6" flood-opacity="0.45"/>
    </filter>
    <marker id="s36-arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M1 0 L6 3 L1 6" stroke="#A3B5D6" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>

  <text x="30" y="30" font-size="10" letter-spacing="2" fill="#A1AABB">COSTOS</text>
  <text x="30" y="52" font-size="15" font-weight="600" fill="#F3F6F9">Model routing</text>

  <!-- cost dial -->
  <path d="M417 96 A28 28 0 0 1 473 96" stroke="#313342" stroke-width="6" stroke-linecap="round"/>
  <path d="M431 72.5 A28 28 0 0 1 459 72.5" stroke="#A3B5D6" stroke-width="6" stroke-linecap="round"/>
  <line x1="445" y1="96" x2="451" y2="73" stroke="#A3B5D6" stroke-width="2"/>
  <circle cx="445" cy="96" r="3.5" fill="#A3B5D6"/>
  <text x="445" y="114" font-size="7" fill="#A1AABB" text-anchor="middle">potencia donde</text>
  <text x="445" y="124" font-size="7" fill="#A1AABB" text-anchor="middle">hay decisiones</text>

  <!-- engines -->
  <circle cx="87" cy="170" r="17" fill="#232A36" stroke="#A3B5D6"/>
  <circle cx="87" cy="170" r="7" stroke="#A3B5D6" stroke-opacity="0.6"/>
  <text x="87" y="173.5" font-size="8" font-weight="600" fill="#A3B5D6" text-anchor="middle">M</text>
  <text x="87" y="214" font-size="7" fill="#A1AABB" text-anchor="middle">modelo medio</text>

  <circle cx="205" cy="161" r="26" fill="#232A36" stroke="#A3B5D6" stroke-width="2" filter="url(#s36-glow)"/>
  <circle cx="205" cy="161" r="11" stroke="#A3B5D6" stroke-opacity="0.6"/>
  <text x="205" y="165" font-size="10" font-weight="600" fill="#A3B5D6" text-anchor="middle">XL</text>
  <text x="205" y="214" font-size="7.5" font-weight="600" fill="#A3B5D6" text-anchor="middle">el más potente</text>

  <circle cx="323" cy="170" r="17" fill="#232A36" stroke="#A3B5D6"/>
  <circle cx="323" cy="170" r="7" stroke="#A3B5D6" stroke-opacity="0.6"/>
  <text x="323" y="173.5" font-size="8" font-weight="600" fill="#A3B5D6" text-anchor="middle">M</text>
  <text x="323" y="214" font-size="7" fill="#A1AABB" text-anchor="middle">modelo medio</text>

  <circle cx="441" cy="177" r="10" fill="#232A36" stroke="#A3B5D6" stroke-opacity="0.8"/>
  <text x="441" y="180.5" font-size="7" font-weight="600" fill="#A3B5D6" text-anchor="middle">S</text>
  <text x="441" y="214" font-size="7" fill="#A1AABB" text-anchor="middle">el más barato</text>

  <!-- pipeline -->
  <rect x="40" y="238" width="94" height="30" rx="9" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.5"/>
  <text x="87" y="257" font-size="8.5" letter-spacing="1" fill="#F3F6F9" text-anchor="middle">EXPLORAR</text>
  <line x1="138" y1="253" x2="154" y2="253" stroke="#A3B5D6" marker-end="url(#s36-arrow)"/>

  <rect x="158" y="238" width="94" height="30" rx="9" fill="#1c212c" stroke="#A3B5D6"/>
  <text x="205" y="257" font-size="8.5" letter-spacing="1" fill="#F3F6F9" text-anchor="middle">DISEÑAR</text>
  <line x1="256" y1="253" x2="272" y2="253" stroke="#A3B5D6" marker-end="url(#s36-arrow)"/>

  <rect x="276" y="238" width="94" height="30" rx="9" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.5"/>
  <text x="323" y="257" font-size="8" letter-spacing="0.5" fill="#F3F6F9" text-anchor="middle">IMPLEMENTAR</text>
  <line x1="374" y1="253" x2="390" y2="253" stroke="#A3B5D6" marker-end="url(#s36-arrow)"/>

  <rect x="394" y="238" width="94" height="30" rx="9" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.5"/>
  <text x="441" y="257" font-size="8.5" letter-spacing="1" fill="#F3F6F9" text-anchor="middle">ARCHIVAR</text>

  <!-- footer -->
  <text x="260" y="316" font-size="11" font-weight="600" fill="#A3B5D6" text-anchor="middle">el modelo también se presupuesta</text>
  <text x="260" y="332" font-size="8" fill="#8394A3" text-anchor="middle">lo caro, solo donde se decide</text>
</svg>
