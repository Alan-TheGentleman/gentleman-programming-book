<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Diagrama de atención: el token genera Q, K y V, y el token N compara su Q contra los K y V de todos los tokens anteriores">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s10-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="s10-arr" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#A3B5D6"/></marker>
    <marker id="s10-arr-q" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#7FB4CA"/></marker>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">TRANSFORMERS · ATENCIÓN</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Atención: Q, K y V</text>

  <!-- token produces three vectors -->
  <rect x="88" y="90" width="68" height="28" rx="8" fill="#232A36" stroke="#A3B5D6" stroke-opacity="0.7"/>
  <text x="122" y="108" text-anchor="middle" font-size="10" fill="#F3F6F9">token</text>

  <line x1="156" y1="104" x2="192" y2="71" stroke="#A3B5D6" stroke-opacity="0.6" marker-end="url(#s10-arr)"/>
  <line x1="156" y1="104" x2="192" y2="104" stroke="#A3B5D6" stroke-opacity="0.6" marker-end="url(#s10-arr)"/>
  <line x1="156" y1="104" x2="192" y2="137" stroke="#A3B5D6" stroke-opacity="0.6" marker-end="url(#s10-arr)"/>

  <rect x="198" y="57" width="208" height="26" rx="8" fill="#1c212c" stroke="#313342"/>
  <text x="212" y="74" font-size="10" fill="#A1AABB"><tspan font-size="11" font-weight="600" fill="#7FB4CA">Q</tspan> · qué busco</text>
  <rect x="198" y="91" width="208" height="26" rx="8" fill="#1c212c" stroke="#313342"/>
  <text x="212" y="108" font-size="10" fill="#A1AABB"><tspan font-size="11" font-weight="600" fill="#DFBD76">K</tspan> · qué ofrezco</text>
  <rect x="198" y="125" width="208" height="26" rx="8" fill="#1c212c" stroke="#313342"/>
  <text x="212" y="142" font-size="10" fill="#A1AABB"><tspan font-size="11" font-weight="600" fill="#B7CC85">V</tspan> · qué aporto</text>

  <!-- formula chip -->
  <rect x="168" y="166" width="184" height="26" rx="9" fill="#232A36" stroke="#A3B5D6" stroke-opacity="0.5" filter="url(#s10-glow)"/>
  <text x="260" y="183" text-anchor="middle" font-size="12" fill="#F3F6F9">softmax(QKᵀ/√d)·V</text>

  <!-- previous tokens with K/V pairs -->
  <g>
    <rect x="92" y="208" width="56" height="46" rx="6" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.45"/>
    <text x="120" y="221" text-anchor="middle" font-size="8" fill="#8394A3">t1</text>
    <rect x="100" y="228" width="18" height="16" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.8"/>
    <text x="109" y="239" text-anchor="middle" font-size="8" fill="#DFBD76">K</text>
    <rect x="122" y="228" width="18" height="16" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.8"/>
    <text x="131" y="239" text-anchor="middle" font-size="8" fill="#B7CC85">V</text>
  </g>
  <g>
    <rect x="158" y="208" width="56" height="46" rx="6" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.45"/>
    <text x="186" y="221" text-anchor="middle" font-size="8" fill="#8394A3">t2</text>
    <rect x="166" y="228" width="18" height="16" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.8"/>
    <text x="175" y="239" text-anchor="middle" font-size="8" fill="#DFBD76">K</text>
    <rect x="188" y="228" width="18" height="16" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.8"/>
    <text x="197" y="239" text-anchor="middle" font-size="8" fill="#B7CC85">V</text>
  </g>
  <g>
    <rect x="224" y="208" width="56" height="46" rx="6" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.45"/>
    <text x="252" y="221" text-anchor="middle" font-size="8" fill="#8394A3">t3</text>
    <rect x="232" y="228" width="18" height="16" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.8"/>
    <text x="241" y="239" text-anchor="middle" font-size="8" fill="#DFBD76">K</text>
    <rect x="254" y="228" width="18" height="16" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.8"/>
    <text x="263" y="239" text-anchor="middle" font-size="8" fill="#B7CC85">V</text>
  </g>
  <g>
    <rect x="290" y="208" width="56" height="46" rx="6" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.45"/>
    <text x="318" y="221" text-anchor="middle" font-size="8" fill="#8394A3">t4</text>
    <rect x="298" y="228" width="18" height="16" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.8"/>
    <text x="307" y="239" text-anchor="middle" font-size="8" fill="#DFBD76">K</text>
    <rect x="320" y="228" width="18" height="16" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.8"/>
    <text x="329" y="239" text-anchor="middle" font-size="8" fill="#B7CC85">V</text>
  </g>
  <g>
    <rect x="356" y="208" width="56" height="46" rx="6" fill="#1c212c" stroke="#A3B5D6" stroke-opacity="0.45"/>
    <text x="384" y="221" text-anchor="middle" font-size="8" fill="#8394A3">t5</text>
    <rect x="364" y="228" width="18" height="16" rx="3" fill="#DFBD76" fill-opacity="0.18" stroke="#DFBD76" stroke-opacity="0.8"/>
    <text x="373" y="239" text-anchor="middle" font-size="8" fill="#DFBD76">K</text>
    <rect x="386" y="228" width="18" height="16" rx="3" fill="#B7CC85" fill-opacity="0.18" stroke="#B7CC85" stroke-opacity="0.8"/>
    <text x="395" y="239" text-anchor="middle" font-size="8" fill="#B7CC85">V</text>
  </g>

  <!-- Q of token N fans out to every previous token -->
  <line x1="260" y1="282" x2="122" y2="260" stroke="#7FB4CA" stroke-opacity="0.75" marker-end="url(#s10-arr-q)"/>
  <line x1="260" y1="282" x2="187" y2="260" stroke="#7FB4CA" stroke-opacity="0.75" marker-end="url(#s10-arr-q)"/>
  <line x1="260" y1="282" x2="252" y2="260" stroke="#7FB4CA" stroke-opacity="0.75" marker-end="url(#s10-arr-q)"/>
  <line x1="260" y1="282" x2="317" y2="260" stroke="#7FB4CA" stroke-opacity="0.75" marker-end="url(#s10-arr-q)"/>
  <line x1="260" y1="282" x2="382" y2="260" stroke="#7FB4CA" stroke-opacity="0.75" marker-end="url(#s10-arr-q)"/>

  <rect x="224" y="284" width="72" height="28" rx="8" fill="#232A36" stroke="#7FB4CA" filter="url(#s10-glow)"/>
  <text x="260" y="302" text-anchor="middle" font-size="10" font-weight="600" fill="#F3F6F9">token N</text>

  <text x="260" y="338" text-anchor="middle" font-size="10" fill="#A1AABB">para el token N: los K,V de <tspan font-weight="600" fill="#F3F6F9">TODOS</tspan> los anteriores</text>
</svg>
