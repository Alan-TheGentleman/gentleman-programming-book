<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Prompt caching: el prefijo estable del prompt se cachea a precio reducido y solo se computa la parte variable del final">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s12-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="s12-clip"><rect x="30" y="96" width="460" height="46" rx="12"/></clipPath>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">OPTIMIZACIÓN DE COSTO</text>
  <text x="260" y="52" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Prompt caching como servicio</text>

  <!-- prompt bar -->
  <g clip-path="url(#s12-clip)">
    <rect x="30" y="96" width="312" height="46" fill="#232A36"/>
    <rect x="30" y="96" width="312" height="46" fill="#B7CC85" fill-opacity="0.14"/>
    <rect x="342" y="96" width="148" height="46" fill="#232A36"/>
    <rect x="342" y="96" width="148" height="46" fill="#DFBD76" fill-opacity="0.12"/>
    <line x1="342" y1="96" x2="342" y2="142" stroke="#313342" stroke-width="2"/>
  </g>
  <rect x="30" y="96" width="460" height="46" rx="12" stroke="#313342"/>
  <rect x="33" y="99" width="306" height="40" rx="9" stroke="#B7CC85" stroke-opacity="0.7" filter="url(#s12-glow)"/>

  <text x="186" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">PREFIJO ESTABLE</text>
  <text x="186" y="131" text-anchor="middle" font-size="9" fill="#B7CC85">system → tools → historial</text>
  <text x="416" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">VARIABLE</text>
  <text x="416" y="131" text-anchor="middle" font-size="9" fill="#DFBD76">mensaje nuevo</text>

  <text x="186" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#B7CC85">cache read: 0.1x</text>
  <text x="416" y="162" text-anchor="middle" font-size="10" fill="#DFBD76">se computa</text>

  <!-- TTL clock chip -->
  <rect x="76" y="196" width="124" height="32" rx="10" fill="#1c212c" stroke="#313342"/>
  <circle cx="100" cy="212" r="9" stroke="#DFBD76" fill="none"/>
  <line x1="100" y1="212" x2="100" y2="206" stroke="#DFBD76"/>
  <line x1="100" y1="212" x2="105" y2="212" stroke="#DFBD76"/>
  <text x="116" y="216" font-size="10" fill="#F3F6F9">TTL ~5 min</text>

  <!-- invalidation warning chip -->
  <rect x="220" y="196" width="232" height="32" rx="10" fill="#1c212c" stroke="#CB7C94" stroke-opacity="0.6"/>
  <circle cx="242" cy="212" r="8" stroke="#CB7C94" fill="none"/>
  <text x="242" y="216" text-anchor="middle" font-size="10" font-weight="600" fill="#CB7C94">!</text>
  <text x="258" y="216" font-size="10" fill="#F3F6F9">un byte cambiado invalida desde ahí</text>

  <!-- stable-first ordering -->
  <rect x="83" y="258" width="64" height="24" rx="8" fill="#232A36" stroke="#313342"/>
  <text x="115" y="273" text-anchor="middle" font-size="9" fill="#B7CC85">system</text>
  <text x="157" y="273" text-anchor="middle" font-size="10" fill="#8394A3">→</text>
  <rect x="167" y="258" width="52" height="24" rx="8" fill="#232A36" stroke="#313342"/>
  <text x="193" y="273" text-anchor="middle" font-size="9" fill="#B7CC85">tools</text>
  <text x="229" y="273" text-anchor="middle" font-size="10" fill="#8394A3">→</text>
  <rect x="239" y="258" width="74" height="24" rx="8" fill="#232A36" stroke="#313342"/>
  <text x="276" y="273" text-anchor="middle" font-size="9" fill="#B7CC85">historial</text>
  <text x="323" y="273" text-anchor="middle" font-size="10" fill="#8394A3">→</text>
  <rect x="333" y="258" width="104" height="24" rx="8" fill="#232A36" stroke="#313342"/>
  <text x="385" y="273" text-anchor="middle" font-size="9" fill="#DFBD76">mensaje nuevo</text>

  <text x="260" y="316" text-anchor="middle" font-size="10" fill="#A1AABB">lo <tspan font-weight="600" fill="#B7CC85">estable</tspan> primero, lo <tspan font-weight="600" fill="#DFBD76">variable</tspan> al final</text>
</svg>
