<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Patrón orquestador–minion: un hilo fino delega a minions con contexto fresco que devuelven solo un resumen">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s32-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7FB4CA" flood-opacity="0.4"/>
    </filter>
    <marker id="s32-up" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M1 0 L6 3 L1 6" stroke="#7FB4CA" stroke-width="1.2" fill="none"/>
    </marker>
    <marker id="s32-down" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M1 0 L6 3 L1 6" stroke="#8394A3" stroke-width="1.2" fill="none"/>
    </marker>
  </defs>

  <text x="30" y="30" font-size="10" letter-spacing="2" fill="#A1AABB">PATRÓN</text>
  <text x="30" y="52" font-size="15" font-weight="600" fill="#F3F6F9">Orquestador–minion</text>

  <!-- orchestrator bar -->
  <rect x="60" y="66" width="400" height="32" rx="10" fill="#1c212c" stroke="#7FB4CA" filter="url(#s32-glow)"/>
  <text x="260" y="86" font-size="10" letter-spacing="1" fill="#7FB4CA" text-anchor="middle">ORQUESTADOR · hilo fino · decide y delega</text>

  <!-- minions -->
  <g>
    <!-- minion 1 -->
    <line x1="64" y1="102" x2="64" y2="144" stroke="#8394A3" marker-end="url(#s32-down)"/>
    <line x1="152" y1="144" x2="152" y2="102" stroke="#7FB4CA" marker-end="url(#s32-up)"/>
    <rect x="58" y="113" width="100" height="15" rx="6" fill="#232A36" stroke="#7FB4CA" stroke-opacity="0.5"/>
    <text x="108" y="123.5" font-size="6.5" fill="#7FB4CA" text-anchor="middle">resumen 500 tokens</text>

    <rect x="40" y="150" width="136" height="140" rx="10" fill="#1c212c" stroke="#313342"/>
    <text x="108" y="166" font-size="7" letter-spacing="0.5" fill="#A1AABB" text-anchor="middle">MINION · contexto fresco</text>
    <rect x="66" y="176" width="84" height="20" rx="7" fill="#232A36" stroke="#7FB4CA" stroke-opacity="0.6"/>
    <text x="108" y="189" font-size="9" fill="#F3F6F9" text-anchor="middle">explorar</text>
    <rect x="60" y="206" width="96" height="46" rx="9" fill="#232A36" stroke="#313342"/>
    <text x="108" y="228" font-size="17" font-weight="600" fill="#7FB4CA" text-anchor="middle">50k</text>
    <text x="108" y="244" font-size="6.5" fill="#8394A3" text-anchor="middle">tokens de trabajo</text>
    <text x="108" y="276" font-size="7" fill="#A1AABB" text-anchor="middle"><tspan fill="#B7CC85">nace</tspan> → ejecuta → <tspan opacity="0.45">muere</tspan></text>
  </g>
  <g>
    <!-- minion 2 -->
    <line x1="216" y1="102" x2="216" y2="144" stroke="#8394A3" marker-end="url(#s32-down)"/>
    <line x1="304" y1="144" x2="304" y2="102" stroke="#7FB4CA" marker-end="url(#s32-up)"/>
    <rect x="210" y="113" width="100" height="15" rx="6" fill="#232A36" stroke="#7FB4CA" stroke-opacity="0.5"/>
    <text x="260" y="123.5" font-size="6.5" fill="#7FB4CA" text-anchor="middle">resumen 500 tokens</text>

    <rect x="192" y="150" width="136" height="140" rx="10" fill="#1c212c" stroke="#313342"/>
    <text x="260" y="166" font-size="7" letter-spacing="0.5" fill="#A1AABB" text-anchor="middle">MINION · contexto fresco</text>
    <rect x="218" y="176" width="84" height="20" rx="7" fill="#232A36" stroke="#7FB4CA" stroke-opacity="0.6"/>
    <text x="260" y="189" font-size="9" fill="#F3F6F9" text-anchor="middle">escribir</text>
    <rect x="212" y="206" width="96" height="46" rx="9" fill="#232A36" stroke="#313342"/>
    <text x="260" y="228" font-size="17" font-weight="600" fill="#7FB4CA" text-anchor="middle">50k</text>
    <text x="260" y="244" font-size="6.5" fill="#8394A3" text-anchor="middle">tokens de trabajo</text>
    <text x="260" y="276" font-size="7" fill="#A1AABB" text-anchor="middle"><tspan fill="#B7CC85">nace</tspan> → ejecuta → <tspan opacity="0.45">muere</tspan></text>
  </g>
  <g>
    <!-- minion 3 -->
    <line x1="368" y1="102" x2="368" y2="144" stroke="#8394A3" marker-end="url(#s32-down)"/>
    <line x1="456" y1="144" x2="456" y2="102" stroke="#7FB4CA" marker-end="url(#s32-up)"/>
    <rect x="362" y="113" width="100" height="15" rx="6" fill="#232A36" stroke="#7FB4CA" stroke-opacity="0.5"/>
    <text x="412" y="123.5" font-size="6.5" fill="#7FB4CA" text-anchor="middle">resumen 500 tokens</text>

    <rect x="344" y="150" width="136" height="140" rx="10" fill="#1c212c" stroke="#313342"/>
    <text x="412" y="166" font-size="7" letter-spacing="0.5" fill="#A1AABB" text-anchor="middle">MINION · contexto fresco</text>
    <rect x="370" y="176" width="84" height="20" rx="7" fill="#232A36" stroke="#7FB4CA" stroke-opacity="0.6"/>
    <text x="412" y="189" font-size="9" fill="#F3F6F9" text-anchor="middle">testear</text>
    <rect x="364" y="206" width="96" height="46" rx="9" fill="#232A36" stroke="#313342"/>
    <text x="412" y="228" font-size="17" font-weight="600" fill="#7FB4CA" text-anchor="middle">50k</text>
    <text x="412" y="244" font-size="6.5" fill="#8394A3" text-anchor="middle">tokens de trabajo</text>
    <text x="412" y="276" font-size="7" fill="#A1AABB" text-anchor="middle"><tspan fill="#B7CC85">nace</tspan> → ejecuta → <tspan opacity="0.45">muere</tspan></text>
  </g>

  <!-- footer -->
  <text x="260" y="316" font-size="11" font-weight="600" fill="#7FB4CA" text-anchor="middle">sus tokens mueren con él</text>
  <text x="260" y="332" font-size="8" fill="#8394A3" text-anchor="middle">solo el resumen sube al hilo del orquestador</text>
</svg>
