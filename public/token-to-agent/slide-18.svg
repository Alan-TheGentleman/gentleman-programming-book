<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Las tres estrategias de context engineering: cargar bajo demanda, persistir afuera y dividir el trabajo">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s18-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7FB4CA" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="260" y="26" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CONTEXT ENGINEERING</text>
  <text x="260" y="48" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Las 3 estrategias</text>

  <!-- Budget bar chip -->
  <rect x="140" y="58" width="240" height="26" rx="13" fill="#1c212c" stroke="#7FB4CA" filter="url(#s18-glow)"/>
  <rect x="154" y="66" width="9" height="10" rx="2" fill="#7FB4CA"/>
  <rect x="166" y="66" width="9" height="10" rx="2" fill="#7FB4CA" opacity="0.55"/>
  <rect x="178" y="66" width="9" height="10" rx="2" stroke="#7FB4CA" opacity="0.5"/>
  <text x="198" y="75" font-size="9" letter-spacing="1" fill="#7FB4CA">CONTEXTO = PRESUPUESTO</text>

  <!-- Guiding question -->
  <text x="260" y="104" text-anchor="middle" font-size="11" font-weight="500" fill="#F3F6F9">¿mínimo contexto → mejor respuesta?</text>

  <!-- Card 1: green -->
  <rect x="28" y="120" width="148" height="200" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="102" y="148" text-anchor="middle" font-size="18" font-weight="700" fill="#B7CC85">1</text>
  <!-- shelf icon -->
  <line x1="72" y1="200" x2="132" y2="200" stroke="#B7CC85" stroke-width="2" stroke-linecap="round"/>
  <rect x="78" y="182" width="8" height="16" rx="1.5" stroke="#B7CC85" stroke-width="1.5"/>
  <rect x="90" y="182" width="8" height="16" rx="1.5" stroke="#B7CC85" stroke-width="1.5"/>
  <rect x="102" y="182" width="8" height="16" rx="1.5" fill="#B7CC85"/>
  <rect x="116" y="180" width="8" height="16" rx="1.5" stroke="#B7CC85" stroke-width="1.5" transform="rotate(12 120 188)" opacity="0.7"/>
  <text x="102" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">CARGAR BAJO</text>
  <text x="102" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">DEMANDA</text>
  <text x="102" y="273" text-anchor="middle" font-size="9" fill="#A1AABB">(skills/router)</text>
  <rect x="84" y="286" width="36" height="17" rx="8.5" stroke="#B7CC85"/>
  <text x="102" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#B7CC85">M6</text>

  <!-- Card 2: magenta -->
  <rect x="186" y="120" width="148" height="200" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="260" y="148" text-anchor="middle" font-size="18" font-weight="700" fill="#FF8DD7">2</text>
  <!-- disk icon -->
  <ellipse cx="260" cy="174" rx="24" ry="7" stroke="#FF8DD7" stroke-width="1.5"/>
  <path d="M236 174 V198 A24 7 0 0 0 284 198 V174" stroke="#FF8DD7" stroke-width="1.5"/>
  <path d="M236 186 A24 7 0 0 0 284 186" stroke="#FF8DD7" stroke-width="1.5" opacity="0.5"/>
  <text x="260" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">PERSISTIR</text>
  <text x="260" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">AFUERA</text>
  <text x="260" y="273" text-anchor="middle" font-size="9" fill="#A1AABB">(memoria)</text>
  <rect x="242" y="286" width="36" height="17" rx="8.5" stroke="#FF8DD7"/>
  <text x="260" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#FF8DD7">M7</text>

  <!-- Card 3: blue -->
  <rect x="344" y="120" width="148" height="200" rx="12" fill="#1c212c" stroke="#313342"/>
  <text x="418" y="148" text-anchor="middle" font-size="18" font-weight="700" fill="#7FB4CA">3</text>
  <!-- tree icon -->
  <line x1="418" y1="178" x2="398" y2="200" stroke="#7FB4CA" stroke-width="1.5"/>
  <line x1="418" y1="178" x2="438" y2="200" stroke="#7FB4CA" stroke-width="1.5"/>
  <circle cx="418" cy="172" r="7" fill="#7FB4CA"/>
  <circle cx="398" cy="204" r="6" stroke="#7FB4CA" stroke-width="1.5" fill="#232A36"/>
  <circle cx="438" cy="204" r="6" stroke="#7FB4CA" stroke-width="1.5" fill="#232A36"/>
  <text x="418" y="240" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">DIVIDIR EL</text>
  <text x="418" y="255" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">TRABAJO</text>
  <text x="418" y="273" text-anchor="middle" font-size="9" fill="#A1AABB">(sub-agentes)</text>
  <rect x="400" y="286" width="36" height="17" rx="8.5" stroke="#7FB4CA"/>
  <text x="418" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#7FB4CA">M8</text>
</svg>
