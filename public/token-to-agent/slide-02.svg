<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Cómo se entrena un LLM: pretraining con billones de tokens, fine-tuning con ejemplos curados y RLHF con preferencias humanas; de autocompletado a asistente">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s02-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">ENTRENAMIENTO</text>
  <text x="260" y="48" text-anchor="middle" font-size="15" font-weight="600" fill="#F3F6F9">Cómo se entrena un LLM</text>

  <!-- Card halos -->
  <rect x="15" y="75" width="145" height="170" rx="12" fill="#7AA89F" opacity="0.12" filter="url(#s02-glow)"/>
  <rect x="188" y="75" width="145" height="170" rx="12" fill="#7AA89F" opacity="0.12" filter="url(#s02-glow)"/>
  <rect x="360" y="75" width="145" height="170" rx="12" fill="#7AA89F" opacity="0.12" filter="url(#s02-glow)"/>

  <!-- Stage 1: Pretraining -->
  <rect x="15" y="75" width="145" height="170" rx="12" fill="#1c212c" stroke="#7AA89F" stroke-opacity="0.6"/>
  <text x="88" y="98" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1" fill="#7AA89F">1 · PRETRAINING</text>
  <rect x="64" y="118" width="40" height="44" rx="4" fill="#1c212c" stroke="#313342"/>
  <rect x="70" y="124" width="40" height="44" rx="4" fill="#232A36" stroke="#313342"/>
  <rect x="76" y="130" width="40" height="44" rx="4" fill="#232A36" stroke="#313342"/>
  <rect x="84" y="140" width="24" height="2" rx="1" fill="#8394A3"/>
  <rect x="84" y="148" width="24" height="2" rx="1" fill="#8394A3"/>
  <rect x="84" y="156" width="18" height="2" rx="1" fill="#8394A3"/>
  <text x="88" y="204" text-anchor="middle" font-size="9" fill="#A1AABB">billones de tokens</text>
  <text x="88" y="218" text-anchor="middle" font-size="9" fill="#A1AABB">aprende lenguaje y mundo</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="164" y1="160" x2="178" y2="160" stroke="#7AA89F" stroke-width="1.5"/>
  <path d="M178 155 L186 160 L178 165 Z" fill="#7AA89F"/>

  <!-- Stage 2: Fine-tuning -->
  <rect x="188" y="75" width="145" height="170" rx="12" fill="#1c212c" stroke="#7AA89F" stroke-opacity="0.6"/>
  <text x="260" y="98" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1" fill="#7AA89F">2 · FINE-TUNING</text>
  <rect x="226" y="118" width="44" height="24" rx="9" fill="#232A36" stroke="#313342"/>
  <circle cx="240" cy="130" r="1.8" fill="#A1AABB"/>
  <circle cx="248" cy="130" r="1.8" fill="#A1AABB"/>
  <circle cx="256" cy="130" r="1.8" fill="#A1AABB"/>
  <rect x="250" y="150" width="44" height="24" rx="9" fill="#7AA89F" fill-opacity="0.2" stroke="#7AA89F"/>
  <circle cx="264" cy="162" r="1.8" fill="#7AA89F"/>
  <circle cx="272" cy="162" r="1.8" fill="#7AA89F"/>
  <circle cx="280" cy="162" r="1.8" fill="#7AA89F"/>
  <text x="260" y="204" text-anchor="middle" font-size="9" fill="#A1AABB">ejemplos curados</text>
  <text x="260" y="218" text-anchor="middle" font-size="9" fill="#A1AABB">formato asistente</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="336" y1="160" x2="350" y2="160" stroke="#7AA89F" stroke-width="1.5"/>
  <path d="M350 155 L358 160 L350 165 Z" fill="#7AA89F"/>

  <!-- Stage 3: RLHF -->
  <rect x="360" y="75" width="145" height="170" rx="12" fill="#1c212c" stroke="#7AA89F" stroke-opacity="0.6"/>
  <text x="432" y="98" text-anchor="middle" font-size="11" font-weight="600" letter-spacing="1" fill="#7AA89F">3 · RLHF</text>
  <g transform="translate(400,124)">
    <path d="M2 9h3.5v9H2z M7 18h7.5q2.5 0 3-2.5l1-5q.3-2.5-2.2-2.5h-4.3l.8-3.8q.4-2-1.5-2.2q-1-.1-1.5.9L7 9z" fill="#B7CC85"/>
  </g>
  <g transform="translate(462,172) rotate(180)">
    <path d="M2 9h3.5v9H2z M7 18h7.5q2.5 0 3-2.5l1-5q.3-2.5-2.2-2.5h-4.3l.8-3.8q.4-2-1.5-2.2q-1-.1-1.5.9L7 9z" fill="#CB7C94"/>
  </g>
  <text x="432" y="204" text-anchor="middle" font-size="9" fill="#A1AABB">preferencias humanas</text>
  <text x="432" y="218" text-anchor="middle" font-size="9" fill="#A1AABB">elige mejores respuestas</text>

  <!-- Bottom transition chip -->
  <rect x="130" y="276" width="260" height="30" rx="15" fill="#1c212c" stroke="#313342"/>
  <text x="248" y="295" text-anchor="end" font-size="10" fill="#8394A3">autocompletado</text>
  <line x1="256" y1="291" x2="270" y2="291" stroke="#7AA89F" stroke-width="1.5"/>
  <path d="M270 287 L278 291 L270 295 Z" fill="#7AA89F"/>
  <text x="286" y="295" font-size="10" font-weight="600" fill="#7AA89F">asistente</text>
</svg>
