<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Memoria que se reconcilia: dos memorias en conflicto pasan por un juez que decide si una reemplaza a la otra, entra en conflicto o son compatibles">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s29-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">RECONCILIACIÓN</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Memoria que se reconcilia</text>

  <!-- Memorias en colisión -->
  <g transform="rotate(-3 130 98)" opacity="0.8">
    <rect x="52" y="72" width="156" height="52" rx="10" fill="#1c212c" stroke="#313342"/>
    <text x="66" y="93" font-size="9" fill="#8394A3">#12 · antigua</text>
    <text x="66" y="110" font-size="11" fill="#F3F6F9" opacity="0.75">usamos Clean</text>
  </g>
  <g transform="rotate(3 392 98)">
    <rect x="312" y="72" width="160" height="52" rx="10" fill="#1c212c" stroke="#A3B5D6" filter="url(#s29-glow)"/>
    <text x="326" y="93" font-size="9" fill="#A3B5D6">#47 · nueva</text>
    <text x="326" y="110" font-size="11" fill="#F3F6F9">usamos Hexagonal</text>
  </g>
  <path d="M260 82l4 9 10 1-7 7 2 10-9-5-9 5 2-10-7-7 10-1z" fill="#DFBD76" filter="url(#s29-glow)"/>
  <path d="M236 92l-14-4M236 104l-14 4M284 92l14-4M284 104l14 4" stroke="#DFBD76" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Juez -->
  <line x1="260" y1="114" x2="260" y2="138" stroke="#A3B5D6" stroke-dasharray="3 3"/>
  <rect x="222" y="138" width="76" height="28" rx="9" fill="#1c212c" stroke="#A3B5D6"/>
  <path d="M240 146v12M234 158h12M234 149h12M234 149l-3 5h6zM246 149l-3 5h6z" stroke="#A3B5D6" stroke-width="1.2" stroke-linejoin="round"/>
  <text x="256" y="157" font-size="10" font-weight="600" fill="#F3F6F9">JUDGE</text>

  <line x1="260" y1="166" x2="122" y2="192" stroke="#313342"/>
  <line x1="260" y1="166" x2="260" y2="192" stroke="#313342"/>
  <line x1="260" y1="166" x2="396" y2="192" stroke="#313342"/>

  <!-- Opciones de relación -->
  <rect x="70" y="192" width="104" height="26" rx="9" fill="#1c212c" stroke="#A3B5D6" filter="url(#s29-glow)"/>
  <text x="122" y="209" text-anchor="middle" font-size="10" font-weight="600" fill="#A3B5D6">supersedes</text>
  <rect x="204" y="192" width="112" height="26" rx="9" fill="#1c212c" stroke="#313342"/>
  <text x="260" y="209" text-anchor="middle" font-size="10" fill="#8394A3">conflicts_with</text>
  <rect x="346" y="192" width="100" height="26" rx="9" fill="#1c212c" stroke="#313342"/>
  <text x="396" y="209" text-anchor="middle" font-size="10" fill="#8394A3">compatible</text>

  <!-- Resultado -->
  <rect x="70" y="244" width="196" height="30" rx="10" fill="#1c212c" stroke="#B7CC85"/>
  <circle cx="90" cy="259" r="7" stroke="#B7CC85" stroke-width="1.5"/>
  <path d="M86.5 259l2.5 2.5 5-5" stroke="#B7CC85" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="104" y="263" font-size="10" fill="#F3F6F9">#47 supersedes #12</text>

  <!-- Envejecimiento -->
  <rect x="330" y="238" width="170" height="42" rx="10" fill="#1c212c" stroke="#DFBD76" stroke-opacity="0.6"/>
  <circle cx="350" cy="259" r="8" stroke="#DFBD76" stroke-width="1.5"/>
  <path d="M350 254v5l4 3" stroke="#DFBD76" stroke-width="1.5" stroke-linecap="round"/>
  <text x="366" y="256" font-size="10" fill="#DFBD76">needs_review</text>
  <text x="366" y="270" font-size="9" fill="#8394A3">· 6 meses sin verificar</text>

  <text x="260" y="322" text-anchor="middle" font-size="11" fill="#8394A3">contradicción silenciosa &lt; no tener memoria</text>
</svg>
