<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Diagrama de tokenización BPE: caracteres que se fusionan en pares y luego en tokens, con comparación de cantidad de tokens entre palabras">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s05-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#DFBD76" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Header -->
  <text x="24" y="30" font-size="10" letter-spacing="2" fill="#A1AABB">CÓMO LEE EL TEXTO</text>
  <text x="24" y="52" font-size="16" font-weight="600" fill="#F3F6F9">Tokenización: BPE</text>

  <!-- Merge card -->
  <rect x="20" y="64" width="310" height="144" rx="12" fill="#1c212c" stroke="#313342"/>

  <!-- Merge lines: middle -> top -->
  <g stroke="#DFBD76" stroke-opacity="0.35">
    <line x1="77" y1="124" x2="101" y2="100"/>
    <line x1="109" y1="124" x2="101" y2="100"/>
    <line x1="140" y1="124" x2="164" y2="100"/>
    <line x1="181" y1="124" x2="164" y2="100"/>
    <line x1="227" y1="124" x2="238" y2="100"/>
    <line x1="270" y1="124" x2="238" y2="100"/>
  </g>
  <!-- Merge lines: chars -> middle -->
  <g stroke="#A1AABB" stroke-opacity="0.3">
    <line x1="42" y1="168" x2="77" y2="142"/>
    <line x1="61" y1="168" x2="77" y2="142"/>
    <line x1="80" y1="168" x2="109" y2="142"/>
    <line x1="99" y1="168" x2="140" y2="142"/>
    <line x1="118" y1="168" x2="140" y2="142"/>
    <line x1="137" y1="168" x2="181" y2="142"/>
    <line x1="156" y1="168" x2="181" y2="142"/>
    <line x1="175" y1="168" x2="181" y2="142"/>
    <line x1="194" y1="168" x2="181" y2="142"/>
    <line x1="213" y1="168" x2="227" y2="142"/>
    <line x1="232" y1="168" x2="227" y2="142"/>
    <line x1="251" y1="168" x2="227" y2="142"/>
    <line x1="270" y1="168" x2="270" y2="142"/>
    <line x1="289" y1="168" x2="270" y2="142"/>
    <line x1="308" y1="168" x2="270" y2="142"/>
  </g>

  <!-- Top: tokens -->
  <g filter="url(#s05-glow)">
    <rect x="79" y="78" width="44" height="22" rx="6" fill="#DFBD76" fill-opacity="0.16" stroke="#DFBD76"/>
    <rect x="133" y="78" width="62" height="22" rx="6" fill="#DFBD76" fill-opacity="0.16" stroke="#DFBD76"/>
    <rect x="205" y="78" width="66" height="22" rx="6" fill="#DFBD76" fill-opacity="0.16" stroke="#DFBD76"/>
  </g>
  <text x="101" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#DFBD76">des</text>
  <text x="164" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#DFBD76">arroll</text>
  <text x="238" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#DFBD76">ándose</text>

  <!-- Middle: pairs -->
  <g fill="#232A36" stroke="#313342">
    <rect x="63" y="124" width="28" height="18" rx="5"/>
    <rect x="99" y="124" width="20" height="18" rx="5"/>
    <rect x="127" y="124" width="26" height="18" rx="5"/>
    <rect x="161" y="124" width="40" height="18" rx="5"/>
    <rect x="209" y="124" width="36" height="18" rx="5"/>
    <rect x="253" y="124" width="34" height="18" rx="5"/>
  </g>
  <g font-size="10" fill="#F3F6F9" text-anchor="middle">
    <text x="77" y="137">de</text>
    <text x="109" y="137">s</text>
    <text x="140" y="137">ar</text>
    <text x="181" y="137">roll</text>
    <text x="227" y="137">ánd</text>
    <text x="270" y="137">ose</text>
  </g>

  <!-- Bottom: characters -->
  <g fill="#232A36" stroke="#313342" stroke-opacity="0.7">
    <rect x="34" y="168" width="16" height="18" rx="4"/>
    <rect x="53" y="168" width="16" height="18" rx="4"/>
    <rect x="72" y="168" width="16" height="18" rx="4"/>
    <rect x="91" y="168" width="16" height="18" rx="4"/>
    <rect x="110" y="168" width="16" height="18" rx="4"/>
    <rect x="129" y="168" width="16" height="18" rx="4"/>
    <rect x="148" y="168" width="16" height="18" rx="4"/>
    <rect x="167" y="168" width="16" height="18" rx="4"/>
    <rect x="186" y="168" width="16" height="18" rx="4"/>
    <rect x="205" y="168" width="16" height="18" rx="4"/>
    <rect x="224" y="168" width="16" height="18" rx="4"/>
    <rect x="243" y="168" width="16" height="18" rx="4"/>
    <rect x="262" y="168" width="16" height="18" rx="4"/>
    <rect x="281" y="168" width="16" height="18" rx="4"/>
    <rect x="300" y="168" width="16" height="18" rx="4"/>
  </g>
  <g font-size="9" fill="#8394A3" text-anchor="middle">
    <text x="42" y="181">d</text><text x="61" y="181">e</text><text x="80" y="181">s</text>
    <text x="99" y="181">a</text><text x="118" y="181">r</text><text x="137" y="181">r</text>
    <text x="156" y="181">o</text><text x="175" y="181">l</text><text x="194" y="181">l</text>
    <text x="213" y="181">á</text><text x="232" y="181">n</text><text x="251" y="181">d</text>
    <text x="270" y="181">o</text><text x="289" y="181">s</text><text x="308" y="181">e</text>
  </g>

  <!-- Side badge -->
  <rect x="344" y="84" width="156" height="56" rx="10" fill="#1c212c" stroke="#DFBD76" stroke-opacity="0.5"/>
  <text x="422" y="106" text-anchor="middle" font-size="9" letter-spacing="2" fill="#A1AABB">VOCABULARIO</text>
  <text x="422" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#DFBD76">50k–200k piezas</text>
  <text x="422" y="164" text-anchor="middle" font-size="9" fill="#8394A3">los pares más frecuentes</text>
  <text x="422" y="178" text-anchor="middle" font-size="9" fill="#8394A3">se fusionan en piezas</text>

  <!-- Comparison row -->
  <rect x="20" y="228" width="230" height="62" rx="10" fill="#1c212c" stroke="#313342"/>
  <text x="36" y="250" font-size="12" fill="#F3F6F9">&#8220;Hola&#8221;</text>
  <rect x="36" y="258" width="48" height="18" rx="5" fill="#7FB4CA" fill-opacity="0.16" stroke="#7FB4CA"/>
  <text x="60" y="271" text-anchor="middle" font-size="10" fill="#7FB4CA">Hola</text>
  <text x="94" y="271" font-size="11" fill="#A1AABB">= 1 token</text>

  <rect x="262" y="228" width="238" height="62" rx="10" fill="#1c212c" stroke="#313342"/>
  <text x="276" y="250" font-size="12" fill="#F3F6F9">&#8220;desarrollándose&#8221;</text>
  <text x="486" y="250" text-anchor="end" font-size="11" fill="#A1AABB">= 4 tokens</text>
  <rect x="276" y="258" width="34" height="18" rx="5" fill="#7FB4CA" fill-opacity="0.16" stroke="#7FB4CA"/>
  <text x="293" y="271" text-anchor="middle" font-size="10" fill="#7FB4CA">des</text>
  <rect x="316" y="258" width="50" height="18" rx="5" fill="#B7CC85" fill-opacity="0.16" stroke="#B7CC85"/>
  <text x="341" y="271" text-anchor="middle" font-size="10" fill="#B7CC85">arroll</text>
  <rect x="372" y="258" width="34" height="18" rx="5" fill="#A3B5D6" fill-opacity="0.16" stroke="#A3B5D6"/>
  <text x="389" y="271" text-anchor="middle" font-size="10" fill="#A3B5D6">ánd</text>
  <rect x="412" y="258" width="32" height="18" rx="5" fill="#7AA89F" fill-opacity="0.16" stroke="#7AA89F"/>
  <text x="428" y="271" text-anchor="middle" font-size="10" fill="#7AA89F">ose</text>

  <!-- Footer chip -->
  <rect x="140" y="308" width="240" height="26" rx="13" fill="#232A36" stroke="#313342"/>
  <text x="260" y="325" text-anchor="middle" font-size="11" fill="#DFBD76">1 token ≈ 4 caracteres (inglés)</text>
</svg>
