<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Findings ledger con hallazgos por severidad y loop de pasadas hasta dos barridas secas con techo de cuatro">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s42-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#A3B5D6" flood-opacity="0.4"/>
    </filter>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">REVIEW ACOTADO</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Loop until dry: el registro de hallazgos</text>

  <!-- Ledger -->
  <rect x="25" y="78" width="212" height="160" rx="10" fill="#1c212c" stroke="#313342"/>
  <text x="41" y="100" font-size="9" letter-spacing="2" fill="#A3B5D6">REGISTRO (LEDGER)</text>
  <text x="41" y="120" font-size="8" letter-spacing="1" fill="#8394A3">id · sev · estado</text>
  <line x1="41" y1="128" x2="221" y2="128" stroke="#313342"/>
  <text x="41" y="148" font-size="10" fill="#F3F6F9">R1-001 <tspan fill="#8394A3">·</tspan> <tspan fill="#CB7C94">CRIT</tspan> <tspan fill="#8394A3">·</tspan> <tspan fill="#B7CC85">fixed</tspan></text>
  <line x1="41" y1="158" x2="221" y2="158" stroke="#313342" stroke-opacity="0.6"/>
  <text x="41" y="178" font-size="10" fill="#F3F6F9">R3-002 <tspan fill="#8394A3">·</tspan> <tspan fill="#DFBD76">WARN</tspan> <tspan fill="#8394A3">·</tspan> <tspan fill="#DFBD76">open</tspan></text>
  <line x1="41" y1="188" x2="221" y2="188" stroke="#313342" stroke-opacity="0.6"/>
  <text x="41" y="208" font-size="10" fill="#F3F6F9">R2-003 <tspan fill="#8394A3">·</tspan> <tspan fill="#7FB4CA">INFO</tspan> <tspan fill="#8394A3">·</tspan> <tspan fill="#7AA89F">verified</tspan></text>
  <text x="41" y="228" font-size="8" fill="#8394A3">cada hallazgo con ubicación y evidencia</text>

  <!-- Sweep loop -->
  <text x="285" y="82" font-size="9" letter-spacing="2" fill="#A3B5D6">SWEEP LOOP</text>
  <line x1="292" y1="100" x2="292" y2="196" stroke="#A3B5D6" stroke-opacity="0.4"/>
  <circle cx="292" cy="103" r="9" fill="#A3B5D6"/>
  <text x="292" y="107" text-anchor="middle" font-size="8" fill="#1c212c" font-weight="600">1</text>
  <text x="310" y="107" font-size="10" fill="#F3F6F9">pasada 1: <tspan fill="#A3B5D6">3 hallazgos</tspan></text>
  <circle cx="292" cy="137" r="9" fill="#A3B5D6"/>
  <text x="292" y="141" text-anchor="middle" font-size="8" fill="#1c212c" font-weight="600">2</text>
  <text x="310" y="141" font-size="10" fill="#F3F6F9">pasada 2: <tspan fill="#A3B5D6">1</tspan></text>
  <circle cx="292" cy="171" r="9" fill="#1c212c" stroke="#B7CC85" stroke-width="1.5"/>
  <text x="292" y="175" text-anchor="middle" font-size="8" fill="#B7CC85" font-weight="600">3</text>
  <text x="310" y="175" font-size="10" fill="#F3F6F9">pasada 3: <tspan fill="#B7CC85">0</tspan></text>
  <circle cx="292" cy="205" r="9" fill="#1c212c" stroke="#B7CC85" stroke-width="1.5"/>
  <text x="292" y="209" text-anchor="middle" font-size="8" fill="#B7CC85" font-weight="600">4</text>
  <text x="310" y="209" font-size="10" fill="#F3F6F9">pasada 4: <tspan fill="#B7CC85">0</tspan> <tspan fill="#B7CC85" font-weight="600">→ DRY ✓</tspan></text>
  <text x="310" y="228" font-size="8" fill="#8394A3">2 barridas secas consecutivas</text>

  <!-- Techo -->
  <path d="M478,94 h8 v120 h-8" stroke="#A3B5D6" fill="none"/>
  <text transform="rotate(90 498 154)" x="498" y="154" text-anchor="middle" font-size="8" fill="#A3B5D6">techo: 4</text>

  <!-- Footer chips -->
  <g filter="url(#s42-glow)">
    <rect x="172" y="292" width="80" height="26" rx="13" fill="#232A36" stroke="#A3B5D6"/>
    <rect x="266" y="292" width="92" height="26" rx="13" fill="#232A36" stroke="#A3B5D6"/>
  </g>
  <text x="212" y="309" text-anchor="middle" font-size="10" fill="#A3B5D6">acotado</text>
  <text x="312" y="309" text-anchor="middle" font-size="10" fill="#A3B5D6">auditable</text>
</svg>