<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="La diferencia: el mismo modelo solo produce código suelto; rodeado de contexto, memoria, loops acotados y verificación entrega software">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s44-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#DEBA87" flood-opacity="0.4"/>
    </filter>
  </defs>

  <text x="260" y="26" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">MISMO MODELO, DISTINTO RESULTADO</text>
  <text x="260" y="46" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">La diferencia</text>

  <line x1="260" y1="64" x2="260" y2="300" stroke="#313342" stroke-dasharray="4 6"/>

  <!-- Columna izquierda: modelo solo -->
  <text x="135" y="76" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">MODELO SOLO</text>
  <circle cx="135" cy="160" r="56" stroke="#313342" stroke-dasharray="4 6"/>
  <rect x="83" y="142" width="104" height="36" rx="10" fill="#1c212c" stroke="#313342"/>
  <text x="135" y="164" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="1" fill="#F3F6F9">MISMO MODELO</text>
  <line x1="135" y1="220" x2="135" y2="238" stroke="#8394A3" stroke-width="1.5"/>
  <path d="M135 244 L130 235 L140 235 Z" fill="#8394A3"/>
  <rect x="80" y="248" width="110" height="26" rx="8" fill="#232A36" stroke="#313342"/>
  <text x="135" y="265" text-anchor="middle" font-size="11" fill="#8394A3">código suelto</text>

  <!-- Columna derecha: modelo con entorno -->
  <text x="380" y="76" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">MODELO + ENTORNO</text>
  <g filter="url(#s44-glow)">
    <path d="M324.9 150.3 A56 56 0 0 1 370.3 104.9" stroke="#7FB4CA" stroke-width="3" stroke-linecap="round"/>
    <path d="M389.7 104.9 A56 56 0 0 1 435.2 150.3" stroke="#FF8DD7" stroke-width="3" stroke-linecap="round"/>
    <path d="M370.3 215.2 A56 56 0 0 1 324.9 169.7" stroke="#B7CC85" stroke-width="3" stroke-linecap="round"/>
    <path d="M435.2 169.7 A56 56 0 0 1 389.7 215.2" stroke="#A3B5D6" stroke-width="3" stroke-linecap="round"/>
  </g>
  <text x="338" y="98" text-anchor="end" font-size="10" fill="#7FB4CA">contexto</text>
  <text x="422" y="98" text-anchor="start" font-size="10" fill="#FF8DD7">memoria</text>
  <text x="336" y="230" text-anchor="end" font-size="10" fill="#B7CC85">loops acotados</text>
  <text x="424" y="230" text-anchor="start" font-size="10" fill="#A3B5D6">verificación</text>
  <rect x="328" y="142" width="104" height="36" rx="10" fill="#1c212c" stroke="#313342"/>
  <text x="380" y="164" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="1" fill="#F3F6F9">MISMO MODELO</text>
  <line x1="380" y1="220" x2="380" y2="238" stroke="#DEBA87" stroke-width="1.5"/>
  <path d="M380 244 L375 235 L385 235 Z" fill="#DEBA87"/>
  <g filter="url(#s44-glow)">
    <rect x="302" y="248" width="156" height="26" rx="8" fill="#1c212c" stroke="#DEBA87"/>
  </g>
  <text x="380" y="265" text-anchor="middle" font-size="11" font-weight="600" fill="#DEBA87">software entregado</text>

  <text x="260" y="332" text-anchor="middle" font-size="11" fill="#A1AABB">la diferencia es todo lo de alrededor: <tspan font-weight="600" fill="#DEBA87">agent engineering</tspan></text>
</svg>
