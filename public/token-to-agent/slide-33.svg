<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Stop rules: cuatro reglas de delegación obligatoria guiadas por la pregunta de si esto infla mi contexto sin necesidad">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s33-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#DFBD76" flood-opacity="0.4"/>
    </filter>
  </defs>

  <text x="30" y="30" font-size="10" letter-spacing="2" fill="#A1AABB">DISCIPLINA</text>
  <text x="30" y="52" font-size="15" font-weight="600" fill="#F3F6F9">Stop rules</text>

  <!-- guiding question -->
  <rect x="115" y="64" width="290" height="26" rx="13" fill="#1c212c" stroke="#DFBD76" filter="url(#s33-glow)"/>
  <text x="260" y="81" font-size="9.5" fill="#DFBD76" text-anchor="middle">¿esto infla mi contexto sin necesidad?</text>

  <!-- rule 1 -->
  <rect x="30" y="104" width="222" height="88" rx="10" fill="#1c212c" stroke="#313342"/>
  <circle cx="54" cy="130" r="12" fill="#232A36" stroke="#DFBD76"/>
  <text x="54" y="134" font-size="11" font-weight="600" fill="#DFBD76" text-anchor="middle">1</text>
  <text x="74" y="134" font-size="9.5" fill="#F3F6F9">4+ archivos para entender</text>
  <rect x="46" y="156" width="190" height="22" rx="7" fill="#232A36" stroke="#DFBD76" stroke-opacity="0.4"/>
  <text x="141" y="170" font-size="8.5" fill="#DFBD76" text-anchor="middle">→ minion explorador</text>

  <!-- rule 2 -->
  <rect x="268" y="104" width="222" height="88" rx="10" fill="#1c212c" stroke="#313342"/>
  <circle cx="292" cy="130" r="12" fill="#232A36" stroke="#DFBD76"/>
  <text x="292" y="134" font-size="11" font-weight="600" fill="#DFBD76" text-anchor="middle">2</text>
  <text x="312" y="134" font-size="9.5" fill="#F3F6F9">2+ archivos a escribir</text>
  <rect x="284" y="156" width="190" height="22" rx="7" fill="#232A36" stroke="#DFBD76" stroke-opacity="0.4"/>
  <text x="379" y="170" font-size="8.5" fill="#DFBD76" text-anchor="middle">→ writer dedicado</text>

  <!-- rule 3 -->
  <rect x="30" y="204" width="222" height="88" rx="10" fill="#1c212c" stroke="#313342"/>
  <circle cx="54" cy="230" r="12" fill="#232A36" stroke="#DFBD76"/>
  <text x="54" y="234" font-size="11" font-weight="600" fill="#DFBD76" text-anchor="middle">3</text>
  <text x="74" y="234" font-size="9.5" fill="#F3F6F9">~20 tool calls sin delegar</text>
  <rect x="46" y="256" width="190" height="22" rx="7" fill="#232A36" stroke="#DFBD76" stroke-opacity="0.4"/>
  <text x="141" y="270" font-size="8.5" fill="#DFBD76" text-anchor="middle">→ frená</text>

  <!-- rule 4 -->
  <rect x="268" y="204" width="222" height="88" rx="10" fill="#1c212c" stroke="#313342"/>
  <circle cx="292" cy="230" r="12" fill="#232A36" stroke="#DFBD76"/>
  <text x="292" y="234" font-size="11" font-weight="600" fill="#DFBD76" text-anchor="middle">4</text>
  <text x="312" y="234" font-size="9.5" fill="#F3F6F9">review</text>
  <rect x="284" y="256" width="190" height="22" rx="7" fill="#232A36" stroke="#DFBD76" stroke-opacity="0.4"/>
  <text x="379" y="270" font-size="8.5" fill="#DFBD76" text-anchor="middle">→ SIEMPRE contexto fresco</text>

  <!-- footer -->
  <text x="260" y="322" font-size="11" font-weight="600" fill="#DFBD76" text-anchor="middle">reglas, no vibras</text>
  <text x="260" y="338" font-size="8" fill="#8394A3" text-anchor="middle">si la regla dispara, delegás — sin negociar</text>
</svg>
