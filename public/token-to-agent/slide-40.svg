<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Cuatro lentes de review por riesgo enfocadas sobre un mismo diff con tabla de selección">
  <rect width="520" height="360" fill="#06080f" rx="12"/>
  <defs>
    <filter id="s40-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FF8DD7" flood-opacity="0.35"/>
    </filter>
  </defs>

  <text x="260" y="28" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CODE REVIEW 4R</text>
  <text x="260" y="50" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Review por lentes de riesgo</text>

  <!-- Lentes -->
  <g fill="#1c212c">
    <circle cx="90" cy="98" r="21" stroke="#CB7C94" stroke-width="1.5"/>
    <circle cx="205" cy="98" r="21" stroke="#7FB4CA" stroke-width="1.5"/>
    <circle cx="320" cy="98" r="21" stroke="#B7CC85" stroke-width="1.5"/>
    <circle cx="435" cy="98" r="21" stroke="#DEBA87" stroke-width="1.5"/>
  </g>
  <g stroke-width="2" stroke-linecap="round">
    <line x1="105" y1="113" x2="115" y2="123" stroke="#CB7C94"/>
    <line x1="220" y1="113" x2="230" y2="123" stroke="#7FB4CA"/>
    <line x1="335" y1="113" x2="345" y2="123" stroke="#B7CC85"/>
    <line x1="450" y1="113" x2="460" y2="123" stroke="#DEBA87"/>
  </g>
  <circle cx="90" cy="98" r="10" fill="#CB7C94" fill-opacity="0.18"/>
  <circle cx="205" cy="98" r="10" fill="#7FB4CA" fill-opacity="0.18"/>
  <circle cx="320" cy="98" r="10" fill="#B7CC85" fill-opacity="0.18"/>
  <circle cx="435" cy="98" r="10" fill="#DEBA87" fill-opacity="0.18"/>

  <text x="90" y="140" text-anchor="middle" font-size="9" letter-spacing="1" fill="#CB7C94">SEGURIDAD</text>
  <text x="205" y="140" text-anchor="middle" font-size="9" letter-spacing="1" fill="#7FB4CA">MANTENIBILIDAD</text>
  <text x="320" y="140" text-anchor="middle" font-size="9" letter-spacing="1" fill="#B7CC85">CONFIABILIDAD</text>
  <text x="435" y="140" text-anchor="middle" font-size="9" letter-spacing="1" fill="#DEBA87">RESILIENCIA</text>
  <text x="90" y="153" text-anchor="middle" font-size="8" fill="#8394A3">secretos · authz</text>
  <text x="205" y="153" text-anchor="middle" font-size="8" fill="#8394A3">naming · deuda</text>
  <text x="320" y="153" text-anchor="middle" font-size="8" fill="#8394A3">tests · regresiones</text>
  <text x="435" y="153" text-anchor="middle" font-size="8" fill="#8394A3">retry · observabilidad</text>

  <!-- Convergencia al diff -->
  <g stroke-opacity="0.45" stroke-width="1.2">
    <line x1="98" y1="159" x2="238" y2="177" stroke="#CB7C94"/>
    <line x1="208" y1="159" x2="252" y2="177" stroke="#7FB4CA"/>
    <line x1="316" y1="159" x2="268" y2="177" stroke="#B7CC85"/>
    <line x1="426" y1="159" x2="282" y2="177" stroke="#DEBA87"/>
  </g>
  <g filter="url(#s40-glow)">
    <rect x="225" y="178" width="70" height="26" rx="8" fill="#1c212c" stroke="#FF8DD7"/>
  </g>
  <text x="260" y="195" text-anchor="middle" font-size="10" fill="#F3F6F9">diff</text>

  <!-- Tabla de selección -->
  <rect x="60" y="222" width="400" height="64" rx="10" fill="#1c212c" stroke="#313342"/>
  <text x="260" y="247" text-anchor="middle" font-size="9" fill="#F3F6F9">shell que muta estado <tspan fill="#FF8DD7">→</tspan> <tspan fill="#A1AABB">confiabilidad + resiliencia</tspan></text>
  <line x1="76" y1="256" x2="444" y2="256" stroke="#313342"/>
  <text x="260" y="273" text-anchor="middle" font-size="9" fill="#F3F6F9">código crítico o &gt;400 líneas <tspan fill="#FF8DD7">→</tspan> <tspan fill="#A1AABB">los 4 en paralelo</tspan></text>

  <text x="260" y="322" text-anchor="middle" font-size="11" fill="#FF8DD7">review genérico → problemas genéricos</text>
</svg>