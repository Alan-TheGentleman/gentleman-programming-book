  <text x="260" y="161" text-anchor="middle" font-size="11" font-weight="600" fill="#F3F6F9">DEL STACK</text>
  <rect x="220" y="169" width="80" height="16" rx="8" fill="#232A36" stroke="#B7CC85" stroke-opacity="0.6"/>
  <text x="260" y="180" text-anchor="middle" font-size="9" fill="#B7CC85">open source</text>

