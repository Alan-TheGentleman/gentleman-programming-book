  <text x="260" y="26" text-anchor="middle" font-size="10" letter-spacing="2" fill="#A1AABB">CIERRE DEL CURSO</text>
  <text x="260" y="48" text-anchor="middle" font-size="16" font-weight="600" fill="#F3F6F9">Para llevarse</text>

  <!-- Card 1: memoria de agente -->
  <rect x="22" y="64" width="152" height="132" rx="12" fill="#1c212c" stroke="#313342"/>
  <path d="M82 86 v28 a16 6 0 0 0 32 0 v-28" stroke="#DFBD76" stroke-width="1.5"/>
