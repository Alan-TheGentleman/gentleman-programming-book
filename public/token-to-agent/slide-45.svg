<svg viewBox="0 0 520 360" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Space Grotesk,sans-serif" role="img" aria-label="Para llevarse: memoria de agente, configurador del stack y este deck, todo open source, con un primer paso para mañana">
