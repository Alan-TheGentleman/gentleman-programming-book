    <line x1="269.2" y1="90.8" x2="272.7" y2="87.3"/>
    <line x1="260" y1="87" x2="260" y2="82"/>
    <line x1="250.8" y1="90.8" x2="247.3" y2="87.3"/>
    <line x1="247" y1="100" x2="242" y2="100"/>
    <line x1="250.8" y1="109.2" x2="247.3" y2="112.7"/>
    <line x1="260" y1="113" x2="260" y2="118"/>
    <line x1="269.2" y1="109.2" x2="272.7" y2="112.7"/>
  </g>
