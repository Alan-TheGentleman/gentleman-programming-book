  <rect x="346" y="64" width="152" height="132" rx="12" fill="#1c212c" stroke="#313342"/>
  <rect x="408" y="82" width="36" height="24" rx="3" fill="#232A36" stroke="#8394A3"/>
  <rect x="400" y="90" width="36" height="24" rx="3" fill="#1c212c" stroke="#DEBA87" stroke-width="1.5"/>
  <line x1="406" y1="97" x2="422" y2="97" stroke="#DEBA87" stroke-width="2"/>
  <line x1="406" y1="103" x2="428" y2="103" stroke="#A1AABB" stroke-width="1.5"/>
  <line x1="406" y1="108" x2="420" y2="108" stroke="#A1AABB" stroke-width="1.5"/>
