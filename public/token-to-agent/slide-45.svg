  <!-- Cierre -->
  <text x="440" y="316" text-anchor="end" font-size="12" font-weight="600" fill="#DEBA87">tu loop recién arranca</text>
  <line x1="450" y1="312" x2="482" y2="312" stroke="#DEBA87" stroke-width="1.5"/>
  <path d="M492 312 L482 307 L482 317 Z" fill="#DEBA87"/>
