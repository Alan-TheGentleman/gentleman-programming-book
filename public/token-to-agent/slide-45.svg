  <g stroke="#DFBD76" stroke-width="1.5" stroke-linecap="round">
    <line x1="30" y1="208" x2="30" y2="218"/>
    <line x1="25" y1="213" x2="35" y2="213"/>
    <line x1="490" y1="278" x2="490" y2="286"/>
    <line x1="486" y1="282" x2="494" y2="282"/>
